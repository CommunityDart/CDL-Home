<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dart Liga</title>

<style>
:root{
  --bg:#03131b;
  --text:#f5fbff;
  --muted:#90a9b7;

  --accent:#20b7ff;
  --green:#3ddc97;
  --red:#e74c3c;

  --table-head-bg:#041722;
  --table-head-text:#c8dce6;
  --table-row-a:#052130;
  --table-row-b:#041924;
  --table-row-hover:#0a2b3b;
  --table-border:rgba(120,170,195,.08);
}

body[data-mode="DartCounter"]{
  --accent:#f59e0b;

  --table-head-bg:#2a1606;
  --table-head-text:#ffe7bf;
  --table-row-a:#1f1308;
  --table-row-b:#160d06;
  --table-row-hover:#35200d;
  --table-border:rgba(245,158,11,.12);
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.wrap{max-width:1300px;margin:auto;padding:20px}

h1{margin:0;font-size:50px}

.controls{display:flex;gap:10px;margin:15px 0}

button{
  padding:10px 16px;
  border-radius:10px;
  border:1px solid #333;
  background:#0b1f2a;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}

button.active{
  border-color:var(--accent);
  box-shadow:inset 3px 0 0 var(--accent);
}

.discord{
  margin:20px 0;
  padding:25px;
  border-radius:18px;
  background:linear-gradient(135deg,#5865F2,#7c3aed);
}

.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}

.tab{
  padding:10px 14px;
  border-radius:10px;
  background:#0b1f2a;
  cursor:pointer;
}

.tab.active{
  border-left:4px solid var(--accent);
}

.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.table-box{
  border-radius:15px;
  overflow:hidden;
  border:1px solid #222;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:var(--table-head-bg);
  color:var(--table-head-text);
  padding:12px;
  text-align:left;
}

td{
  padding:12px;
  border-bottom:1px solid var(--table-border);
}

tr:nth-child(odd) td{background:var(--table-row-a)}
tr:nth-child(even) td{background:var(--table-row-b)}

tr:hover td{background:var(--table-row-hover)}

.rank.first{border-left:6px solid var(--green)}
.rank.last{border-left:6px solid var(--red)}

.matchday{
  border:1px solid #222;
  border-radius:12px;
  margin-bottom:10px;
}

.match-head{
  padding:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.match-body{display:none;padding:10px}

.matchday.open .match-body{display:block}

.badge{font-size:12px;padding:4px 8px;border-radius:10px}
.done{color:#3ddc97}
.open-b{color:#ffd166}

</style>
</head>

<body data-mode="Autodarts">

<div class="wrap">

<h1>DIVISIONS</h1>

<div class="controls">
<button id="auto" class="active">Autodarts</button>
<button id="dc">DartCounter</button>
<button onclick="load()">Neu laden</button>
</div>

<div class="discord">
<b>Community Discord</b><br>
Tritt der Liga bei 👉 <a href="#">Discord</a>
</div>

<div id="tabs" class="tabs"></div>

<div class="main">
<div id="table"></div>
<div id="matches"></div>
</div>

</div>

<script>
const SHEET="1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

const leagues=[
"Autodarts Liga 1","Autodarts Liga 2","Autodarts Liga 3",
"DartCounter Liga 1","DartCounter Liga 2","DartCounter Liga 3"
];

let data={},active="",mode="Autodarts";

async function csv(name){
 const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:csv&sheet=${name}`);
 return (await r.text()).split("\n").map(r=>r.split(","));
}

function parseTable(rows){
 let res=[];
 for(let r of rows){
   if(!r[0]||isNaN(r[0]))continue;
   res.push(r);
 }
 return res;
}

function parseMatches(rows){
 let map={};
 for(let r of rows){
   if(!r[0]||isNaN(r[0]))continue;
   let tag="Spieltag "+r[0];
   if(!map[tag])map[tag]=[];
   map[tag].push(r);
 }
 return map;
}

async function load(){
 data={};

 for(let l of leagues){
   let t=await csv(l);
   let e=await csv("Erg "+l);

   data[l]={
     table:parseTable(t),
     matches:parseMatches(e)
   };
 }

 renderTabs();
 render();
}

function renderTabs(){
 let el=document.getElementById("tabs");
 el.innerHTML="";

 let filtered=leagues.filter(l=>l.startsWith(mode) && data[l].table.length);

 if(!active||!filtered.includes(active))active=filtered[0];

 for(let l of filtered){
   let b=document.createElement("div");
   b.className="tab"+(l===active?" active":"");
   b.innerText=l;
   b.onclick=()=>{active=l;renderTabs();render();}
   el.appendChild(b);
 }
}

function render(){
 let t=data[active].table;
 let m=data[active].matches;

 let tableHTML=`<div class="table-box"><table>
<tr><th>Platz</th><th>Spieler</th><th>Punkte</th></tr>`;

 t.forEach((r,i)=>{
   let cls="rank";
   if(i===0)cls+=" first";
   if(i===t.length-1)cls+=" last";

   tableHTML+=`<tr>
   <td class="${cls}">${r[0]}</td>
   <td>${r[1]}</td>
   <td>${r[5]}</td>
   </tr>`;
 });

 tableHTML+="</table></div>";
 document.getElementById("table").innerHTML=tableHTML;

 let matchHTML="";
 for(let tag in m){
   let games=m[tag];

   let done=games.every(g=>g[7]==="Fertig");

   matchHTML+=`
   <div class="matchday">
     <div class="match-head">
       ${tag}
       <span class="badge ${done?"done":"open-b"}">${done?"fertig":"offen"}</span>
     </div>
     <div class="match-body">
       ${games.map(g=>`${g[1]} vs ${g[3]} (${g[5]}:${g[6]})`).join("<br>")}
     </div>
   </div>`;
 }

 document.getElementById("matches").innerHTML=matchHTML;

 document.querySelectorAll(".match-head").forEach(e=>{
   e.onclick=()=>e.parentElement.classList.toggle("open");
 });
}

document.getElementById("auto").onclick=()=>{
 mode="Autodarts";
 document.body.dataset.mode="Autodarts";
 renderTabs();render();
}

document.getElementById("dc").onclick=()=>{
 mode="DartCounter";
 document.body.dataset.mode="DartCounter";
 renderTabs();render();
}

load();
</script>

</body>
</html>
