<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Dart Liga</title>
  <style>
    :root{
      --bg:#03131b;
      --panel:#041924;
      --line:rgba(120,170,195,.12);
      --text:#f5fbff;
      --muted:#90a9b7;
      --green:#3ddc97;
      --red:#e74c3c;
      --yellow:#f7c948;
      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
      --row-a:#052130;
      --row-b:#041924;
    }

    body[data-mode="DartCounter"]{
      --accent:#ff9f1c;
      --accent-border:rgba(255,159,28,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, #021017 100%);
      color:var(--text);
      min-height:100vh;
      transition:background .2s ease;
    }

    .wrap{
      width:min(1400px, calc(100% - 28px));
      margin:0 auto;
      padding:8px 0 42px;
    }

    /* ===== BANNER OPTIMIERUNG (KEINE SCHWARZEN BALKEN) ===== */
    .hero-banner.image-banner{
      position:relative;
      margin:0 0 14px;
      /* Das Seitenverhältnis sorgt dafür, dass der Kasten so breit/hoch wie das Bild ist */
      aspect-ratio: 4 / 1; 
      width: 100%;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)),
        url("banner (3).png") center center / cover no-repeat;
      background-color:#000;
    }

    .hero-banner.image-banner::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.02) 0%, rgba(0,0,0,.06) 55%, rgba(0,0,0,.12) 100%);
      pointer-events:none;
    }

    /* Navigation & Layout */
    .top-nav-wrap{ width:min(1200px, 100%); margin:0 auto 12px; }
    .banner-nav-shell{ display:flex; justify-content:center; align-items:center; margin-bottom:10px; }
    .banner-nav{
      width:100%;
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px;
      padding:12px;
      border-radius:22px;
      background:rgba(4,12,14,.22);
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 24px rgba(0,0,0,.20);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .button, .mode-btn, .footer-btn, .footer-link, .info-btn, .hero-action-btn{
      border:1px solid rgba(75,135,165,.28);
      background:rgba(4,25,36,.96);
      color:var(--text);
      border-radius:12px;
      min-height:46px;
      padding:0 16px;
      font-size:14px;
      cursor:pointer;
      font-weight:800;
      transition:.16s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .hero-action-btn{ width:100%; border:1px solid rgba(255,255,255,.16); background:rgba(6,20,30,.38); }
    .hero-action-btn:hover{ transform:translateY(-2px); background:rgba(10,28,40,.48); }
    .hero-btn-autodarts{ background:rgba(36,141,255,.20); border-color:rgba(90,180,255,.45); }
    .hero-btn-dartcounter{ background:rgba(255,154,31,.18); border-color:rgba(255,186,90,.42); }
    
    .active{ border-color:var(--accent-border) !important; background:#082738 !important; }

    .main{ display:grid; grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr); gap:18px; align-items:start; }
    .table-shell, .matchday{ border:1px solid var(--line); background:linear-gradient(180deg, rgba(6,27,37,.96), rgba(4,20,28,.98)); border-radius:18px; overflow:hidden; }

    /* Tabellen Styling */
    table{ width:100%; border-collapse:collapse; }
    th{ padding:14px; background:#041722; text-align:left; font-size:12px; text-transform:uppercase; color:var(--muted); }
    td{ padding:14px; border-bottom:1px solid var(--line); font-size:14px; }
    .rank-col{ width:60px; font-weight:900; }
    .rank-col.first{ border-left:4px solid var(--green); }
    .rank-col.last{ border-left:4px solid var(--red); }
    .points-cell{ font-weight:900; color:var(--accent); }

    /* Sidebar / Spieltage */
    .matchday-list{ display:flex; flex-direction:column; gap:12px; }
    .matchday-head{ width:100%; background:none; border:none; color:white; padding:16px; display:flex; justify-content:space-between; cursor:pointer; font-weight:800; }
    .matchday-body{ display:none; padding:0 14px 14px; }
    .open .matchday-body{ display:block; }

    /* Discord & Player Meta */
    .player-meta-row{ display:flex; gap:8px; font-size:11px; color:var(--muted); margin-top:4px; }
    .card-badge{ width:10px; height:14px; border-radius:2px; display:inline-block; }
    .yellow{ background:var(--yellow); }
    .red{ background:var(--red); }

    .footer{ margin-top:40px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .footer-note{ width:100%; text-align:center; color:var(--muted); font-size:12px; }

    /* Modals */
    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:1000; }
    .modal-backdrop.open{ display:flex; }
    .modal{ width:min(800px, 95%); background:var(--panel); border-radius:20px; overflow:hidden; }
    .modal-head{ padding:18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
    .modal-body{ padding:18px; max-height:70vh; overflow-y:auto; color:#ccc; line-height:1.6; }

    @media (max-width:1100px){ .main{ grid-template-columns:1fr; } }
    @media (max-width:760px){
      .hero-banner.image-banner{ aspect-ratio: 2.5 / 1; border-radius:15px; } /* Mobil etwas höher für bessere Lesbarkeit */
      .banner-nav{ grid-template-columns:repeat(2, 1fr); }
      .submenu-row{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body data-mode="Autodarts">
  <div class="wrap">
    <section class="hero-banner image-banner"></section>

    <div class="top-nav-wrap">
      <section class="banner-nav-shell">
        <div class="banner-nav">
          <button id="modeAutodarts" class="hero-action-btn hero-btn-autodarts active">Autodarts</button>
          <button id="modeDartCounter" class="hero-action-btn hero-btn-dartcounter">DartCounter</button>
          <a href="https://discord.gg/DEINLINK" target="_blank" class="hero-action-btn" style="background:rgba(88,101,242,.2)">Discord</a>
          <button id="regelwerkBtn" class="hero-action-btn">Regelwerk</button>
          <button id="faqBtn" class="hero-action-btn">FAQ</button>
        </div>
      </section>
      <div id="submenuArea" class="submenu-row" style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
        </div>
    </div>

    <section class="main">
      <div id="tableArea"></div>
      <aside class="sidebar">
        <div id="matchdayArea" class="matchday-list"></div>
      </aside>
    </section>

    <div class="footer">
      <button id="openImpressumBtn" class="footer-btn">Impressum</button>
      <a class="footer-link" href="#">Spenden</a>
      <div class="footer-note">Community Dart Liga 2026</div>
    </div>
  </div>

  <div id="genericModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitle">Info</h3><button id="closeModal" class="button">✕</button></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";
    const LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6", "DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3"];
    
    let state = { mode: "Autodarts", activeLeague: "Autodarts Liga 1", leagueData: {} };

    async function loadData() {
      // Vereinfachte Lade-Logik für dieses Beispiel (nutzt deine Struktur)
      for (const l of LEAGUES) {
        state.leagueData[l] = { 
          standings: { rows: [["1", "Beispiel Spieler", "10", "2", "20", "30"]] },
          matchdays: [{ title: "Spieltag 1", status: "offen", doneMatches: 0, totalMatches: 4, rows: [] }]
        };
      }
      render();
    }

    function render() {
      const modeLeagues = LEAGUES.filter(l => l.startsWith(state.mode));
      
      // Submenu
      const sub = document.getElementById("submenuArea");
      sub.innerHTML = modeLeagues.map(l => `<button class="submenu-btn ${l === state.activeLeague ? 'active' : ''}" onclick="changeLeague('${l}')">${l}</button>`).join("");

      // Tabelle
      const data = state.leagueData[state.activeLeague];
      document.getElementById("tableArea").innerHTML = `
        <div class="table-shell">
          <div class="section-head"><h3 class="section-title">Tabelle ${state.activeLeague}</h3></div>
          <table>
            <thead><tr><th class="rank-col">#</th><th>Spieler</th><th>S</th><th>N</th><th>+/-</th><th>Pkt</th></tr></thead>
            <tbody>${data.standings.rows.map(r => `<tr><td class="rank-col first">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td class="points-cell">${r[5]}</td></tr>`).join("")}</tbody>
          </table>
        </div>`;

      // Spieltage
      document.getElementById("matchdayArea").innerHTML = data.matchdays.map(d => `
        <div class="matchday">
          <button class="matchday-head" onclick="this.parentElement.classList.toggle('open')">
            <span>${d.title}</span>
            <span style="font-size:12px; opacity:0.6">${d.doneMatches}/${d.totalMatches}</span>
          </button>
          <div class="matchday-body"><div style="padding:10px; opacity:0.5; font-size:13px;">Keine Spiele eingetragen.</div></div>
        </div>`).join("");
    }

    function changeLeague(l) { state.activeLeague = l; render(); }

    document.getElementById("modeAutodarts").onclick = () => { state.mode = "Autodarts"; state.activeLeague = "Autodarts Liga 1"; render(); };
    document.getElementById("modeDartCounter").onclick = () => { state.mode = "DartCounter"; state.activeLeague = "DartCounter Liga 1"; render(); };

    // Modal Handling
    const modal = document.getElementById("genericModal");
    function showModal(title, body) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalBody").innerHTML = body;
      modal.classList.add("open");
    }
    document.getElementById("closeModal").onclick = () => modal.classList.remove("open");
    document.getElementById("openImpressumBtn").onclick = () => showModal("Impressum", "Kontaktinformationen hier...");
    document.getElementById("regelwerkBtn").onclick = () => showModal("Regelwerk", "Die Regeln der Liga...");
    document.getElementById("faqBtn").onclick = () => showModal("FAQ", "Häufig gestellte Fragen...");

    loadData();
  </script>
</body>
</html>
