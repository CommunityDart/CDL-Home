<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Dart Liga</title>
  <style>
    :root{
      --bg:#03131b;
      --panel:#041924;
      --line:rgba(120,170,195,.12);
      --text:#f5fbff;
      --muted:#90a9b7;
      --green:#3ddc97;
      --red:#e74c3c;
      --yellow:#f7c948;
      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
      --row-a:#052130;
      --row-b:#041924;
    }

    body[data-mode="DartCounter"]{
      --accent:#ff9f1c;
      --accent-border:rgba(255,159,28,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, #021017 100%);
      color:var(--text);
      min-height:100vh;
      transition:background .2s ease;
    }

    .wrap{
      width:min(1400px, calc(100% - 28px));
      margin:0 auto;
      padding:8px 0 42px;
    }

    /* ===== BANNER FIX ===== */
    .hero-banner.image-banner{
      position:relative;
      margin:0 0 14px;
      aspect-ratio: 4 / 1;
      min-height: 200px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 44px rgba(0,0,0,.34);
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)),
        url("banner%20.png") center center / cover no-repeat;
      background-color:#000;
    }

    .hero-banner.image-banner::before{
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.02) 0%, rgba(0,0,0,.06) 55%, rgba(0,0,0,.12) 100%);
      pointer-events:none;
    }

    .banner-nav{
      display:grid; grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px; padding:12px; border-radius:22px;
      background:rgba(4,12,14,.22); border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }

    .hero-action-btn, .footer-btn, .footer-link, .info-btn, .button{
      border:1px solid rgba(75,135,165,.28); background:rgba(4,25,36,.96);
      color:var(--text); border-radius:12px; min-height:46px;
      font-size:14px; cursor:pointer; font-weight:800;
      text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }

    /* ===== PLAYER NAME LINK STYLE ===== */
    .player-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      transition: opacity 0.2s;
    }
    .player-link:hover { opacity: 0.7; }

    .submenu-row{ display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:12px; margin-top:10px; }
    .submenu-slot{ min-height:52px; display:none; flex-wrap:wrap; gap:10px; }
    .submenu-slot.active{ display:flex; }
    .submenu-slot.left{ grid-column:1 / span 3; }
    .submenu-slot.middle{ grid-column:2 / span 3; }

    .submenu-btn{
      border:1px solid rgba(75,135,165,.24); background:rgba(5,26,37,.92);
      color:#dff3ff; padding:11px 14px; border-radius:12px; font-weight:800; cursor:pointer;
    }
    .submenu-btn.active{ border-color:var(--accent-border); background:#082738; box-shadow: inset 3px 0 0 var(--accent); }

    .main{ display:grid; grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr); gap:18px; }
    .table-shell, .matchday{ border:1px solid var(--line); background:rgba(4,25,36,0.95); border-radius:18px; }

    table{ width:100%; border-collapse:collapse; min-width:600px; }
    th{ padding:14px; background:#041722; text-align:left; font-size:12px; color:var(--muted); }
    td{ padding:14px; border-bottom:1px solid var(--line); }

    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; z-index:1000; }
    .modal-backdrop.open{ display:flex; }
    .modal{ width:min(450px, 95%); background:var(--panel); border-radius:20px; border:1px solid var(--line); overflow:hidden; }
    .modal-head{ padding:18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
    .modal-body{ padding:25px; color:#fff; }
    .detail-row{ margin-bottom:15px; display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:5px; }
    .detail-label{ color: var(--muted); font-size: 13px; }
    .detail-value{ font-weight: 800; color: var(--accent); }

    @media (max-width:1100px){ .main{ grid-template-columns:1fr; } }
    @media (max-width:760px){
      .hero-banner.image-banner{ aspect-ratio: 2.5 / 1; }
      .banner-nav, .submenu-row{ grid-template-columns:repeat(2, 1fr); }
    }
  </style>
</head>
<body data-mode="Autodarts">
  <div class="wrap">
    <section class="hero-banner image-banner"></section>

    <div class="top-nav-wrap">
      <section class="banner-nav-shell">
        <div class="banner-nav">
          <button id="modeAutodarts" class="hero-action-btn active">Autodarts</button>
          <button id="modeDartCounter" class="hero-action-btn">DartCounter</button>
          <a href="#" class="hero-action-btn">Discord</a>
          <button id="regelwerkBtn" class="hero-action-btn">Regelwerk</button>
          <button id="faqBtn" class="hero-action-btn">FAQ</button>
        </div>
      </section>
      <div class="submenu-row">
        <div id="autodartsSubmenu" class="submenu-slot left active"></div>
        <div id="dartcounterSubmenu" class="submenu-slot middle"></div>
      </div>
    </div>

    <section class="main">
      <div id="tableArea"></div>
      <aside class="sidebar">
        <div id="matchdayArea"></div>
      </aside>
    </section>
  </div>

  <div id="playerModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3>Spieler-Details</h3><button onclick="closePlayerModal()" class="button">✕</button></div>
      <div id="playerDetailBody" class="modal-body"></div>
    </div>
  </div>

  <div id="genericModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitle">Info</h3><button id="closeModal" class="button">✕</button></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";
    const PLAYER_SHEET = "Spieler_Discord";
    const LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6", "DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3"];

    const state = { mode: "Autodarts", activeLeague: "", leagueData: {}, playerMeta: {} };

    function csvUrl(sn) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sn)}`; }

    async function loadData() {
      // 1. Spieler Meta (Discord & AVG) laden
      try {
        const resp = await fetch(csvUrl(PLAYER_SHEET));
        const text = await resp.text();
        const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
        
        rows.forEach(row => {
          const name = row[0]?.toLowerCase();
          if(name) {
            state.playerMeta[name] = {
              discord: row[1] || "Nicht hinterlegt",
              avg: row[4] || "Kein AVG", // Spalte E
              fullPlatformName: row[0]
            };
          }
        });
      } catch(e) { console.error("Fehler beim Laden der Spieler-Daten", e); }

      // 2. Ligen laden
      for (const l of LEAGUES) {
        try {
          const resp = await fetch(csvUrl(l));
          const text = await resp.text();
          const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
          
          let tm = -1;
          for(let i=0; i<rows.length; i++) if(rows[i].join("").toLowerCase().includes("tabelle")) tm = i;
          
          const standings = [];
          if(tm !== -1) {
            for(let i=tm+1; i<rows.length; i++) {
              if(rows[i][0] && !isNaN(rows[i][0])) {
                standings.push([rows[i][0], rows[i][1], rows[i][5]]); // Platz, Name, Punkte
              }
            }
          }
          state.leagueData[l] = { standings };
        } catch(e) {}
      }
      setMode("Autodarts");
    }

    function renderLeague() {
      const data = state.leagueData[state.activeLeague];
      const area = document.getElementById("tableArea");
      if(!data) return;

      const tbody = data.standings.map(r => {
        const pName = r[1];
        return `<tr>
          <td>${r[0]}</td>
          <td><span class="player-link" onclick="showPlayerDetails('${pName}')">${pName}</span></td>
          <td>${r[2]}</td>
        </tr>`;
      }).join("");

      area.innerHTML = `<div class="table-shell">
        <div class="section-head"><h3>${state.activeLeague}</h3></div>
        <table><thead><tr><th>#</th><th>Spieler (Klicken für Info)</th><th>Pkt</th></tr></thead><tbody>${tbody}</tbody></table>
      </div>`;
    }

    function showPlayerDetails(name) {
      const meta = state.playerMeta[name.toLowerCase()] || { discord: "Unbekannt", avg: "-", fullPlatformName: name };
      const body = document.getElementById("playerDetailBody");
      
      body.innerHTML = `
        <div class="detail-row"><span class="detail-label">Plattform Name:</span> <span class="detail-value">${meta.fullPlatformName}</span></div>
        <div class="detail-row"><span class="detail-label">Discord Name:</span> <span class="detail-value">${meta.discord}</span></div>
        <div class="detail-row"><span class="detail-label">Eingereichter AVG:</span> <span class="detail-value">${meta.avg}</span></div>
      `;
      document.getElementById("playerModal").classList.add("open");
    }

    function closePlayerModal() { document.getElementById("playerModal").classList.remove("open"); }

    function setMode(m) {
      state.mode = m;
      document.body.setAttribute("data-mode", m);
      const filtered = LEAGUES.filter(l => l.startsWith(m));
      state.activeLeague = filtered[0];
      
      const subAutodarts = document.getElementById("autodartsSubmenu");
      const subDartcounter = document.getElementById("dartcounterSubmenu");
      
      const renderSub = (el, list) => {
        el.innerHTML = list.map(l => `<button class="submenu-btn ${l===state.activeLeague?'active':''}" onclick="state.activeLeague='${l}';renderLeague();">${l}</button>`).join("");
      };

      renderSub(subAutodarts, LEAGUES.filter(l => l.startsWith("Autodarts")));
      renderSub(subDartcounter, LEAGUES.filter(l => l.startsWith("DartCounter")));
      
      subAutodarts.classList.toggle("active", m === "Autodarts");
      subDartcounter.classList.toggle("active", m === "DartCounter");
      renderLeague();
    }

    document.getElementById("modeAutodarts").onclick = () => setMode("Autodarts");
    document.getElementById("modeDartCounter").onclick = () => setMode("DartCounter");

    loadData();
  </script>
</body>
</html>
