<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Community Dart Liga</title>

<style>
/* ================== BASIS ================== */
:root{
  --bg:#03131b;
  --line:rgba(120,170,195,.12);
  --text:#f5fbff;
  --muted:#90a9b7;
  --green:#3ddc97;
  --red:#e74c3c;

  --accent:#20b7ff;
}

body[data-mode="DartCounter"]{
  --accent:#f59e0b;
}

/* ================== BODY ================== */
body{
  margin:0;
  font-family:Arial;
  background:#03131b;
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* ================== BUTTONS ================== */
.mode-btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.mode-btn.active{
  background:var(--accent);
}

/* ================== TABELLE ================== */
.table-shell{
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--line);
}

/* AUTODARTS DEFAULT */
.table-shell{
  background:#041924;
}

/* 🔥 DARTCOUNTER STYLE */
body[data-mode="DartCounter"] .table-shell{
  background:linear-gradient(180deg,#1b0f04,#120802);
  border-color:rgba(245,158,11,.2);
}

thead th{
  padding:12px;
  background:#051e2b;
  font-size:12px;
  text-transform:uppercase;
}

body[data-mode="DartCounter"] thead th{
  background:#2a1606;
  color:#ffcc80;
}

tbody td{
  padding:12px;
}

tbody tr:nth-child(odd) td{background:#052130}
tbody tr:nth-child(even) td{background:#041924}

body[data-mode="DartCounter"] tbody tr:nth-child(odd) td{background:#241405}
body[data-mode="DartCounter"] tbody tr:nth-child(even) td{background:#1a0e04}

tbody tr:hover td{
  background:#0a2b3b;
}

body[data-mode="DartCounter"] tbody tr:hover td{
  background:#3a1d06;
}

/* ================== MATCHDAY ================== */
.matchday{
  margin-top:15px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--line);
}

body[data-mode="DartCounter"] .matchday{
  background:linear-gradient(180deg,#1b0f04,#120802);
  border-color:rgba(245,158,11,.2);
}

/* HEADER */
.matchday-head{
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
  align-items:center;
}

/* 🔥 SAUBERE FLUCHT */
.matchday-head-right{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  width:96px;
  gap:10px;
}

.matchday-progress{
  width:46px;
  text-align:right;
  font-weight:900;
}

/* STATUS */
.status-badge{
  width:38px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.status-dot.done{background:var(--green)}
.status-dot.open{background:var(--red)}

/* MATCH TABLE */
.match-table td{
  padding:12px;
  vertical-align:middle;
}

.match-player{
  display:flex;
  align-items:center;
  min-height:24px;
}

.status-cell{
  width:96px;
  text-align:right;
}

/* ================== BANNER ================== */
.banner{
  display:flex;
  justify-content:space-between;
  gap:15px;
  margin-bottom:15px;
}

.card{
  flex:1;
  padding:15px;
  border-radius:14px;
  background:#0c2433;
}

/* ================== DISCORD BUTTON ================== */
.discord-btn{
  padding:10px 16px;
  border-radius:10px;
  background:#5865F2;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  transition:.2s;
}

body[data-mode="Autodarts"] .discord-btn:hover{
  box-shadow:0 0 20px #20b7ff;
}

body[data-mode="DartCounter"] .discord-btn:hover{
  box-shadow:0 0 20px #f59e0b;
}

/* ================== RESPONSIVE ================== */
@media(max-width:800px){
  .banner{flex-direction:column}
}
</style>
</head>

<body data-mode="Autodarts">

<div class="wrap">

<!-- MODUS -->
<button class="mode-btn active" onclick="setMode('Autodarts')">Autodarts</button>
<button class="mode-btn" onclick="setMode('DartCounter')">DartCounter</button>

<!-- BANNER -->
<div class="banner">
  <div class="card">
    <h3>Community Discord</h3>
    <a class="discord-btn" href="#">Discord beitreten</a>
  </div>
  <div class="card">
    <h3>Wichtige Infos</h3>
    <button>Regeln</button>
    <button>FAQ</button>
  </div>
</div>

<!-- TABELLE -->
<div class="table-shell">
<table>
<thead>
<tr>
<th>Platz</th><th>Spieler</th><th>Punkte</th>
</tr>
</thead>
<tbody>
<tr><td>1</td><td>frank</td><td>10</td></tr>
<tr><td>2</td><td>ibo</td><td>8</td></tr>
</tbody>
</table>
</div>

<!-- MATCHDAY -->
<div class="matchday">
<div class="matchday-head">
<span>Spieltag 2</span>
<div class="matchday-head-right">
<span class="matchday-progress">2/5</span>
<div class="status-badge"><span class="status-dot open"></span></div>
</div>
</div>

<table class="match-table">
<tr>
<td class="match-player">frank</td>
<td class="match-player">elf</td>
<td>2</td>
<td>4</td>
<td class="status-cell"><span class="status-dot done"></span></td>
</tr>
</table>
</div>

</div>

<script>
function setMode(mode){
  document.body.setAttribute("data-mode", mode)

  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"))
  if(mode==="Autodarts") document.querySelectorAll(".mode-btn")[0].classList.add("active")
  else document.querySelectorAll(".mode-btn")[1].classList.add("active")
}
</script>

</body>
</html>
