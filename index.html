<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Community Dart Liga</title>

  <style>
    :root{
      --bg:#050d16;
      --panel:#0b1b33;
      --panel-2:#112544;
      --line:#1d3a63;
      --text:#ffffff;
      --muted:#9db7d8;
      --blue:#56a8ff;
      --green:#57e389;
      --orange:#ffb347;
      --gold:#ffcc4d;
      --silver:#cbd5e1;
      --bronze:#d18b47;
      --danger:#ff6b6b;
      --shadow:0 0 0 1px rgba(86,168,255,.15), 0 10px 30px rgba(0,0,0,.25);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top, rgba(31,82,145,.18), transparent 35%),
        linear-gradient(180deg, #04101d 0%, #02070e 100%);
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      width:min(1280px, calc(100% - 28px));
      margin:20px auto 40px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:18px 22px;
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(11,27,51,.96), rgba(8,19,38,.96));
      box-shadow:var(--shadow);
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .eyebrow{
      color:var(--blue);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-size:34px;
      line-height:1.05;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
    }

    .top-grid{
      display:grid;
      grid-template-columns:1.2fr repeat(3, minmax(150px, 220px));
      gap:12px;
      margin-bottom:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(11,27,51,.98), rgba(10,22,42,.98));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .stat{
      padding:18px 18px 16px;
      min-height:88px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .stat .label{
      color:#b9d1ee;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:4px;
    }

    .stat .value{
      font-size:18px;
      font-weight:700;
    }

    .stat .big{
      font-size:42px;
      line-height:1;
      font-weight:800;
      margin-top:2px;
    }

    .big.green{color:var(--green)}
    .big.orange{color:var(--orange)}
    .big.blue{color:var(--blue)}

    .league{
      margin-top:18px;
      overflow:hidden;
    }

    .league-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(13,33,63,.95), rgba(10,25,48,.95));
    }

    .league-title{
      margin:0;
      font-size:22px;
      font-weight:800;
    }

    .league-body{
      padding:16px;
    }

    .section-title{
      margin:0 0 14px;
      font-size:16px;
      color:#d9e8fb;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid rgba(86,168,255,.08);
      border-radius:14px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
    }

    thead th{
      text-align:center;
      background:#132a4b;
      color:#fff;
      padding:13px 12px;
      font-size:14px;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
    }

    tbody td{
      text-align:center;
      padding:13px 12px;
      border-bottom:1px solid rgba(86,168,255,.14);
      color:#fff;
      font-size:15px;
    }

    tbody tr:hover{
      background:rgba(86,168,255,.05);
    }

    td.player{
      text-align:left;
      font-weight:700;
    }

    .medal{
      margin-right:6px;
    }

    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:0 0 14px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(86,168,255,.08);
      color:#dcebff;
      font-size:13px;
    }

    .loading,
    .empty,
    .error{
      padding:22px;
      text-align:center;
      color:var(--muted);
    }

    .error{
      color:#ffd0d0;
    }

    .footer{
      text-align:center;
      color:#7fa2ca;
      font-size:13px;
      margin-top:18px;
      opacity:.9;
    }

    @media (max-width: 980px){
      .top-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width: 640px){
      .top-grid{
        grid-template-columns:1fr;
      }

      h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="brand">
        <div class="eyebrow">Community Dart Liga</div>
        <h1>Tabellen & Spieltage</h1>
        <div class="sub">Automatisch aus Google Sheets geladen</div>
      </div>
    </div>

    <div class="top-grid" id="topGrid">
      <div class="card stat">
        <div class="label">Aktueller Spieltag</div>
        <div class="value" id="currentMatchdayText">Lädt...</div>
        <div class="sub" id="currentMatchdaySub">Bitte warten</div>
      </div>

      <div class="card stat">
        <div class="label">Begegnungen</div>
        <div class="big blue" id="matchesCount">-</div>
      </div>

      <div class="card stat">
        <div class="label">Offen</div>
        <div class="big orange" id="openCount">-</div>
      </div>

      <div class="card stat">
        <div class="label">Fertig</div>
        <div class="big green" id="doneCount">-</div>
      </div>
    </div>

    <div id="content" class="loading card">Daten werden geladen...</div>

    <div class="footer">
      Community Dart Liga
    </div>
  </div>

  <script>
    /************************************************************
     * KONFIG
     ************************************************************/
    const SPREADSHEET_ID = "1gE5-Z6MXMAXp3feMGW1U8BpmELbLM5VMTANpLb7P_YY";

    const LEAGUE_SHEETS = [
      "Autodarts Liga 1",
      "Autodarts Liga 2",
      "Autodarts Liga 3",
      "Autodarts Liga 4",
      "Autodarts Liga 5",
      "Autodarts Liga 6",
      "Dartcounter Liga 1",
      "Dartcounter Liga 2",
      "Dartcounter Liga 3",
      "Dartcounter Liga 4",
      "Dartcounter Liga 5",
      "Dartcounter Liga 6"
    ];

    const ERG_SHEETS = [
      "Erg Autodarts Liga 1",
      "Erg Autodarts Liga 2",
      "Erg Autodarts Liga 3",
      "Erg Autodarts Liga 4",
      "Erg Autodarts Liga 5",
      "Erg Autodarts Liga 6",
      "Erg Dartcounter Liga 1",
      "Erg Dartcounter Liga 2",
      "Erg Dartcounter Liga 3",
      "Erg Dartcounter Liga 4",
      "Erg Dartcounter Liga 5",
      "Erg Dartcounter Liga 6"
    ];

    /************************************************************
     * HELPERS
     ************************************************************/
    function normalize(str){
      return String(str ?? "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ")
        .replace(/[ä]/g, "ae")
        .replace(/[ö]/g, "oe")
        .replace(/[ü]/g, "ue")
        .replace(/[ß]/g, "ss");
    }

    function toNumber(value){
      if (value === null || value === undefined) return 0;
      const cleaned = String(value)
        .trim()
        .replace(/\./g, "")
        .replace(",", ".")
        .replace(/[^\d.-]/g, "");
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function medalForPlace(place){
      if (place === 1) return "🥇";
      if (place === 2) return "🥈";
      if (place === 3) return "🥉";
      return "";
    }

    function looksLikePlayerName(value){
      const v = String(value ?? "").trim();
      if (!v) return false;
      if (/^spieltag\s+\d+/i.test(v)) return false;
      if (/^(fertig|offen|abgeschlossen)$/i.test(v)) return false;
      return /[a-zA-ZäöüÄÖÜß]/.test(v);
    }

    function getSheetUrl(sheetName){
      return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    }

    async function fetchSheetRows(sheetName){
      const res = await fetch(getSheetUrl(sheetName));
      if (!res.ok) throw new Error(`Fehler beim Laden von ${sheetName}`);
      const text = await res.text();

      const jsonText = text
        .replace(/^\/\*O_o\*\/\s*/, "")
        .replace(/^google\.visualization\.Query\.setResponse\(/, "")
        .replace(/\);\s*$/, "");

      const data = JSON.parse(jsonText);
      const rows = data.table?.rows || [];

      return rows.map(row =>
        (row.c || []).map(cell => {
          if (!cell) return "";
          return cell.f ?? cell.v ?? "";
        })
      );
    }

    function findHeaderRow(rows){
      for (let i = 0; i < rows.length; i++) {
        const line = rows[i].map(normalize);
        const hasSpieler = line.some(c => c.includes("spieler"));
        const hasPunkte = line.some(c => c.includes("punkte"));
        if (hasSpieler && hasPunkte) return i;
      }
      return -1;
    }

    function mapHeaderIndexes(headerRow){
      const map = {};
      headerRow.forEach((cell, index) => {
        const h = normalize(cell);

        if (!map.platz && (h === "platz" || h.includes("rang"))) map.platz = index;
        if (!map.spieler && (h === "spieler" || h.includes("name"))) map.spieler = index;
        if (!map.siege && (h === "siege" || h === "s" || h.includes("gewonnen"))) map.siege = index;
        if (!map.niederlagen && (h === "niederlagen" || h === "n" || h.includes("verloren"))) map.niederlagen = index;
        if (!map.legDiff && (h.includes("leg-diff") || h.includes("legdiff") || h.includes("leg diff") || h.includes("diff"))) map.legDiff = index;
        if (!map.punkte && h.includes("punkte")) map.punkte = index;
      });
      return map;
    }

    function parseLeagueTable(rows){
      const headerIndex = findHeaderRow(rows);
      if (headerIndex === -1) return [];

      const header = rows[headerIndex];
      const idx = mapHeaderIndexes(header);

      if (idx.spieler === undefined) return [];

      const result = [];

      for (let i = headerIndex + 1; i < rows.length; i++) {
        const row = rows[i];
        const spieler = String(row[idx.spieler] ?? "").trim();

        if (!spieler) continue;
        if (!looksLikePlayerName(spieler)) continue;

        const rawPunkte = idx.punkte !== undefined ? row[idx.punkte] : "";
        const rawSiege = idx.siege !== undefined ? row[idx.siege] : "";
        const rawNiederlagen = idx.niederlagen !== undefined ? row[idx.niederlagen] : "";
        const rawLegDiff = idx.legDiff !== undefined ? row[idx.legDiff] : "";
        const rawPlatz = idx.platz !== undefined ? row[idx.platz] : "";

        const punkte = toNumber(rawPunkte);
        const siege = toNumber(rawSiege);
        const niederlagen = toNumber(rawNiederlagen);
        const legDiff = toNumber(rawLegDiff);
        let platz = toNumber(rawPlatz);

        const suspicious =
          String(rawPunkte ?? "").trim().toLowerCase() === spieler.toLowerCase() ||
          String(rawSiege ?? "").trim().toLowerCase() === spieler.toLowerCase() ||
          String(rawNiederlagen ?? "").trim().toLowerCase() === spieler.toLowerCase();

        if (suspicious) continue;

        result.push({
          platz,
          spieler,
          siege,
          niederlagen,
          legDiff,
          punkte
        });
      }

      const cleaned = result.filter(r => r.spieler);

      cleaned.sort((a, b) => {
        if (b.punkte !== a.punkte) return b.punkte - a.punkte;
        if (b.legDiff !== a.legDiff) return b.legDiff - a.legDiff;
        if (b.siege !== a.siege) return b.siege - a.siege;
        return a.spieler.localeCompare(b.spieler, "de");
      });

      cleaned.forEach((row, i) => {
        row.platz = i + 1;
      });

      return cleaned;
    }

    function parseMatchdayStatsFromErgRows(rows){
      const allText = rows
        .flat()
        .map(v => String(v ?? "").trim())
        .filter(Boolean);

      let currentMatchday = 0;
      let totalMatches = 0;
      let done = 0;
      let open = 0;

      for (const line of allText) {
        const md = line.match(/spieltag\s*(\d+)/i);
        if (md) {
          const n = Number(md[1]);
          if (Number.isFinite(n) && n > currentMatchday) currentMatchday = n;
        }

        if (/fertig|abgeschlossen/i.test(line)) done++;
        if (/offen|nicht fertig|ausstehend/i.test(line)) open++;
      }

      totalMatches = done + open;

      return {
        currentMatchday,
        totalMatches,
        done,
        open
      };
    }

    function mergeStats(allStats){
      let currentMatchday = 0;
      let totalMatches = 0;
      let done = 0;
      let open = 0;

      allStats.forEach(stat => {
        currentMatchday = Math.max(currentMatchday, stat.currentMatchday || 0);
        totalMatches += stat.totalMatches || 0;
        done += stat.done || 0;
        open += stat.open || 0;
      });

      return { currentMatchday, totalMatches, done, open };
    }

    function renderTopStats(stats){
      const currentText = document.getElementById("currentMatchdayText");
      const currentSub = document.getElementById("currentMatchdaySub");
      const matchesCount = document.getElementById("matchesCount");
      const openCount = document.getElementById("openCount");
      const doneCount = document.getElementById("doneCount");

      if (!stats.currentMatchday) {
        currentText.textContent = "Kein Spieltag gefunden";
        currentSub.textContent = "Bitte Erg-Blätter prüfen";
      } else {
        currentText.textContent = `Spieltag ${stats.currentMatchday}`;
        currentSub.textContent =
          stats.open === 0
            ? "Alle Spiele dieses Spieltags sind fertig"
            : `${stats.open} Begegnung(en) noch offen`;
      }

      matchesCount.textContent = stats.totalMatches || 0;
      openCount.textContent = stats.open || 0;
      doneCount.textContent = stats.done || 0;
    }

    function renderLeague(leagueName, rows){
      const badges = [];
      const totalPlayers = rows.length;
      const totalPoints = rows.reduce((sum, r) => sum + r.punkte, 0);

      badges.push(`<div class="badge">Spieler: ${totalPlayers}</div>`);
      badges.push(`<div class="badge">Gesamtpunkte: ${totalPoints}</div>`);

      const tableRows = rows.map((row) => {
        const medal = medalForPlace(row.platz);
        return `
          <tr>
            <td>${medal ? `<span class="medal">${medal}</span>` : ""}${row.platz}</td>
            <td class="player">${escapeHtml(row.spieler)}</td>
            <td>${row.siege}</td>
            <td>${row.niederlagen}</td>
            <td>${row.legDiff}</td>
            <td>${row.punkte}</td>
          </tr>
        `;
      }).join("");

      return `
        <section class="league card">
          <div class="league-head">
            <h2 class="league-title">${escapeHtml(leagueName)}</h2>
          </div>
          <div class="league-body">
            <div class="badge-row">${badges.join("")}</div>
            <h3 class="section-title">Tabelle</h3>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Platz</th>
                    <th>Spieler</th>
                    <th>Siege</th>
                    <th>Niederlagen</th>
                    <th>Leg-Diff</th>
                    <th>Punkte</th>
                  </tr>
                </thead>
                <tbody>
                  ${tableRows}
                </tbody>
              </table>
            </div>
          </div>
        </section>
      `;
    }

    async function loadPage(){
      const content = document.getElementById("content");
      content.className = "loading card";
      content.textContent = "Daten werden geladen...";

      try {
        const leaguePromises = LEAGUE_SHEETS.map(async (sheetName) => {
          try {
            const rows = await fetchSheetRows(sheetName);
            const parsed = parseLeagueTable(rows);
            return { name: sheetName, rows: parsed };
          } catch (err) {
            console.error("Fehler Liga:", sheetName, err);
            return { name: sheetName, rows: [] };
          }
        });

        const ergPromises = ERG_SHEETS.map(async (sheetName) => {
          try {
            const rows = await fetchSheetRows(sheetName);
            return parseMatchdayStatsFromErgRows(rows);
          } catch (err) {
            console.error("Fehler Erg:", sheetName, err);
            return { currentMatchday: 0, totalMatches: 0, done: 0, open: 0 };
          }
        });

        const leagueData = await Promise.all(leaguePromises);
        const ergData = await Promise.all(ergPromises);

        const visibleLeagues = leagueData.filter(l => l.rows.length > 0);
        const mergedStats = mergeStats(ergData);

        renderTopStats(mergedStats);

        if (!visibleLeagues.length) {
          content.className = "empty card";
          content.textContent = "Keine Ligen mit Spielern gefunden.";
          return;
        }

        content.className = "";
        content.innerHTML = visibleLeagues.map(l => renderLeague(l.name, l.rows)).join("");
      } catch (err) {
        console.error(err);
        content.className = "error card";
        content.innerHTML = "Fehler beim Laden der Website. Bitte Spreadsheet-ID und Blattnamen prüfen.";
      }
    }

    loadPage();
  </script>
</body>
</html>
