<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Dart Liga</title>
  <style>
    :root{
      --bg:#03131b;
      --panel:#041924;
      --line:rgba(120,170,195,.12);
      --text:#f5fbff;
      --muted:#90a9b7;
      --green:#3ddc97;
      --red:#e74c3c;
      --yellow:#f7c948;

      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
      --row-a:#052130;
      --row-b:#041924;
    }

    body[data-mode="DartCounter"]{
      --accent:#ff9f1c;
      --accent-border:rgba(255,159,28,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, #021017 100%);
      color:var(--text);
      min-height:100vh;
      transition:background .2s ease;
    }

    .wrap{
      width:min(1400px, calc(100% - 28px));
      margin:0 auto;
      padding:8px 0 42px;
    }

    .button,
    .mode-btn,
    .footer-btn,
    .footer-link,
    .info-btn{
      border:1px solid rgba(75,135,165,.28);
      background:rgba(4,25,36,.96);
      color:var(--text);
      border-radius:12px;
      min-height:46px;
      padding:0 16px;
      font-size:14px;
      outline:none;
      cursor:pointer;
      font-weight:800;
      transition:.16s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .button:hover,
    .mode-btn:hover,
    .footer-btn:hover,
    .footer-link:hover,
    .info-btn:hover{
      border-color:var(--accent-border);
      background:#082738;
      transform:translateY(-1px);
    }

    /* ===== BANNER REPARIERT ===== */
    .hero-banner.image-banner{
      position:relative;
      margin:0 0 14px;
      width: 100%;
      /* Aspect-Ratio hält den Kasten im Format des Bildes */
      aspect-ratio: 4 / 1; 
      min-height: 220px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)),
        url("banner (3).png") center center / cover no-repeat;
      background-color:#000;
    }

    .hero-banner.image-banner::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.02) 0%, rgba(0,0,0,.06) 55%, rgba(0,0,0,.12) 100%);
      pointer-events:none;
    }

    /* Spielername Klickbar Styling */
    .player-name-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 800;
    }
    .player-name-link:hover { opacity: 0.7; }

    /* Info Fenster Zeilen Styling */
    .p-info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .p-info-label { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .p-info-value { font-weight: 900; color: var(--text); font-size: 16px; }

    body[data-mode="Autodarts"] .hero-banner.image-banner{
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        0 0 0 1px rgba(32,183,255,.12),
        0 0 24px rgba(32,183,255,.08);
    }

    body[data-mode="DartCounter"] .hero-banner.image-banner{
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        0 0 0 1px rgba(255,159,28,.12),
        0 0 24px rgba(255,159,28,.08);
    }

    .top-nav-wrap{
      width:min(1200px, 100%);
      margin:0 auto 12px;
    }

    .banner-nav-shell{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:10px;
    }

    .banner-nav{
      width:100%;
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px;
      padding:12px;
      border-radius:22px;
      background:rgba(4,12,14,.22);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 10px 24px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .hero-action-btn{
      position:relative;
      width:100%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(6,20,30,.38);
      color:#f5fbff;
      border-radius:16px;
      min-height:50px;
      padding:0 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:10px;
      transition:.22s ease;
      white-space:nowrap;
      overflow:hidden;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.10),
        inset 0 -1px 0 rgba(255,255,255,.03);
    }

    .hero-action-btn:hover{
      transform:translateY(-2px);
      background:rgba(10,28,40,.48);
      border-color:rgba(255,255,255,.24);
    }

    .hero-btn-autodarts{
      background:rgba(36,141,255,.20);
      border-color:rgba(90,180,255,.45);
    }

    .hero-btn-dartcounter{
      background:rgba(255,154,31,.18);
      border-color:rgba(255,186,90,.42);
    }

    .hero-btn-discord{
      background:rgba(88,101,242,.28);
      border-color:rgba(162,170,255,.42);
    }

    .hero-btn-dark{
      background:rgba(3,19,27,.42);
      border-color:rgba(120,170,195,.18);
    }

    #modeAutodarts.active{
      background:rgba(36,141,255,.30);
      border-color:rgba(130,205,255,.72);
      box-shadow: 0 0 28px rgba(36,141,255,.28);
    }

    #modeDartCounter.active{
      background:rgba(255,154,31,.28);
      border-color:rgba(255,206,130,.72);
      box-shadow: 0 0 28px rgba(255,154,31,.24);
    }

    .submenu-row{
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px;
      margin-top:10px;
      align-items:start;
    }

    .submenu-slot{
      min-height:52px;
      display:none;
      flex-wrap:wrap;
      gap:10px;
      align-items:flex-start;
      overflow:visible;
      padding-bottom:0;
    }

    .submenu-slot.active{ display:flex; }
    .submenu-slot.left{ grid-column:1 / span 3; }
    .submenu-slot.middle{ grid-column:2 / span 3; }

    .submenu-btn{
      border:1px solid rgba(75,135,165,.24);
      background:rgba(5,26,37,.92);
      color:#dff3ff;
      padding:11px 14px;
      min-height:42px;
      border-radius:12px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:.16s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 6px 14px rgba(0,0,0,.18);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .submenu-btn.active{
      color:#fff;
      border-color:var(--accent-border);
      background:#082738;
      box-shadow:
        inset 3px 0 0 var(--accent),
        0 0 18px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .main{
      display:grid;
      grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr);
      gap:18px;
      align-items:start;
    }

    .table-shell,
    .matchday{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(6,27,37,.96), rgba(4,20,28,.98));
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      border-radius:18px;
    }

    .table-shell{ overflow:hidden; }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:18px 18px 12px;
      flex-wrap:wrap;
    }

    .section-title{
      margin:0;
      font-size:18px;
      font-weight:900;
      letter-spacing:.01em;
    }

    .table-wrap{
      overflow-x:auto;
      padding:0 0 6px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      table-layout:fixed;
    }

    thead th{
      padding:14px 16px;
      color:#c8dce6;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.04em;
      border-bottom:1px solid var(--line);
      background:#041722;
      white-space:nowrap;
      text-align:left;
    }

    tbody td{
      padding:14px 16px;
      border-bottom:1px solid rgba(120,170,195,.08);
      font-size:15px;
      color:#f1f8fb;
      white-space:nowrap;
      vertical-align:top;
    }

    .rank-col{
      width:84px;
      font-weight:900;
      position:relative;
    }

    .rank-col.first::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:10px; background:var(--green); }
    .rank-col.last::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:10px; background:var(--red); }

    .player-cell{
      width:140px;
      min-width:140px;
      font-weight:800;
    }

    .player-meta-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .player-discord{
      display:block;
      font-size:12px;
      line-height:1.25;
      color:#8ec9ee;
      font-weight:700;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      max-width:none;
    }

    .card-badge{
      display:inline-block;
      width:14px;
      height:18px;
      border-radius:3px;
      border:1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 2px 6px rgba(0,0,0,.18);
    }

    .card-badge.yellow{ background:#f7c948; }
    .card-badge.red{ background:#e74c3c; }

    .matchday-head{
      width:100%;
      border:none;
      background:transparent;
      color:var(--text);
      padding:16px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .matchday-body{
      display:none;
      padding:0 14px 14px;
    }

    .matchday.open .matchday-body{ display:block; }

    .footer{
      margin-top:20px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .footer-note{
      width:100%;
      text-align:center;
      color:#7c95a3;
      font-size:12px;
      margin-top:4px;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    .modal-backdrop.open{ display:flex; }

    .modal{
      width:min(550px, 100%);
      background:linear-gradient(180deg, rgba(6,27,37,.98), rgba(4,20,28,.99));
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:0 24px 60px rgba(0,0,0,.45);
      overflow:hidden;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px 18px 14px;
      border-bottom:1px solid rgba(120,170,195,.10);
    }

    @media (max-width:760px){
      .hero-banner.image-banner{ aspect-ratio: 2.5 / 1; border-radius:20px; }
      .banner-nav, .submenu-row{ grid-template-columns:repeat(2, 1fr); }
    }
  </style>
</head>
<body data-mode="Autodarts">
  <div class="wrap">
    <section class="hero-banner image-banner"></section>

    <div class="top-nav-wrap">
      <section class="banner-nav-shell">
        <div class="banner-nav">
          <button id="modeAutodarts" class="hero-action-btn hero-btn-autodarts mode-btn active" type="button">
            Autodarts
          </button>
          <button id="modeDartCounter" class="hero-action-btn hero-btn-dartcounter mode-btn" type="button">
            DartCounter
          </button>
          <a href="https://discord.gg/DEINLINK" target="_blank" rel="noopener noreferrer" class="hero-action-btn hero-btn-discord discord-main-btn">
            <svg class="discord-icon" viewBox="0 0 127.14 96.36" aria-hidden="true">
              <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2A75.57,75.57,0,0,0,95.73,78c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C35.88,65.69,30.5,59.66,30.5,52.25s5.31-13.44,11.95-13.44S54.4,44.87,54.39,52.25,49,65.69,42.45,65.69Zm42.24,0c-6.57,0-11.95-6-11.95-13.44s5.31-13.44,11.95-13.44S96.64,44.87,96.63,52.25,91.26,65.69,84.69,65.69Z"/>
            </svg>
            <span>Discord</span>
          </a>
          <button id="regelwerkBtn" class="hero-action-btn hero-btn-dark info-btn" type="button">Regelwerk</button>
          <button id="faqBtn" class="hero-action-btn hero-btn-dark info-btn" type="button">FAQ</button>
        </div>
      </section>

      <div class="submenu-row">
        <div id="autodartsSubmenu" class="submenu-slot left active"></div>
        <div id="dartcounterSubmenu" class="submenu-slot middle"></div>
      </div>
    </div>

    <section class="main">
      <div id="tableArea"></div>
      <aside class="sidebar">
        <div id="matchdayArea" class="matchday-list"></div>
      </aside>
    </section>

    <div class="footer">
      <button id="openImpressumBtn" class="footer-btn" type="button">Impressum</button>
      <a class="footer-link" href="https://paypal.me/DEINLINK" target="_blank" rel="noopener noreferrer">Spenden</a>
      <div class="footer-note">Community Dart Liga 2026</div>
    </div>
  </div>

  <div id="playerModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <h3 class="section-title">Spieler Details</h3>
        <button onclick="closeModal('playerModal')" class="button" style="min-height:30px; padding:0 10px;">✕</button>
      </div>
      <div id="playerModalBody" class="modal-body" style="padding:20px;"></div>
    </div>
  </div>

  <div id="genericModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitle" class="section-title"></h3><button onclick="closeModal('genericModal')" class="button">✕</button></div>
      <div id="modalContent" class="modal-body" style="padding:20px; max-height:70vh; overflow:auto;"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";
    const PLAYER_SHEET = "Spieler_Discord";
    const RULES_SHEET = "Regelwerk";
    const FAQ_SHEET = "FAQ";
    const LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6", "DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3", "DartCounter Liga 4", "DartCounter Liga 5", "DartCounter Liga 6"];

    const state = { leagues: [], leagueData: {}, activeLeague: null, activeMode: "Autodarts", playerMetaMap: {}, matchdayOpenState: {}, regelwerkRows: [], faqRows: [] };

    const tableAreaEl = document.getElementById("tableArea");
    const matchdayAreaEl = document.getElementById("matchdayArea");

    // --- ORIGINALER PARSER ---
    function parseCsv(text) {
      const rows = []; let row = []; let cell = ""; let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (inQuotes) {
          if (char === '"' && text[i + 1] === '"') { cell += '"'; i++; }
          else if (char === '"') inQuotes = false;
          else cell += char;
        } else {
          if (char === '"') inQuotes = true;
          else if (char === ',') { row.push(cell); cell = ""; }
          else if (char === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
          else if (char !== '\r') cell += char;
        }
      }
      row.push(cell); rows.push(row); return rows;
    }

    async function loadCsv(sheetName) {
      const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`);
      if (!response.ok) throw new Error("Fehler beim Laden");
      return parseCsv(await response.text());
    }

    function normalize(v) { return String(v ?? "").trim().toLowerCase().replace(/\s+/g, " "); }
    function htmlEscape(v) { return String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function safeCell(row, index) { return row && row[index] !== undefined ? String(row[index]).trim() : ""; }
    function rowHasAnyContent(row) { return row && row.some(c => normalize(c) !== ""); }
    function isFinishedMatch(s, l1, l2) { return /fertig|abgeschlossen|done/i.test(String(s)) || (l1 !== "" && l2 !== "" && l1 !== "-" && l2 !== "-"); }
    function isFinishedMatchday(s) { return /fertig|abgeschlossen|done/i.test(String(s)); }

    function parsePlayerDiscordSheet(rows) {
      const map = {};
      for (let i = 0; i < rows.length; i++) {
        const spieler = safeCell(rows[i], 0);
        if (!spieler || normalize(spieler) === "spieler") continue;
        map[normalize(spieler)] = {
          origName: spieler,
          discord: safeCell(rows[i], 1),
          avg: safeCell(rows[i], 4), // SPALTE E (Index 4)
          yellow: (normalize(safeCell(rows[i], 6)).match(/gelb/g) || []).length,
          red: normalize(safeCell(rows[i], 6)).includes("rot") ? 1 : 0
        };
      }
      return map;
    }

    // Spieler-Info Fenster öffnen
    function openPlayerInfo(name) {
      const m = state.playerMetaMap[normalize(name)] || { origName: name, discord: "Unbekannt", avg: "N/A" };
      document.getElementById("playerModalBody").innerHTML = `
        <div class="p-info-row"><span class="p-info-label">Plattform Name</span><span class="p-info-value">${htmlEscape(m.origName)}</span></div>
        <div class="p-info-row"><span class="p-info-label">Discord Name</span><span class="p-info-value">${htmlEscape(m.discord)}</span></div>
        <div class="p-info-row"><span class="p-info-label">Eingereichter AVG</span><span class="p-info-value">${htmlEscape(m.avg)}</span></div>
      `;
      document.getElementById("playerModal").classList.add("open");
    }

    function sortStandingsWithCards(rows) {
      return [...rows].sort((a, b) => {
        const ma = state.playerMetaMap[normalize(a[1])] || {red:0};
        const mb = state.playerMetaMap[normalize(b[1])] || {red:0};
        if (ma.red !== mb.red) return ma.red ? 1 : -1;
        const ra = parseInt(String(a[0]).replace(/\D/g, ""), 10);
        const rb = parseInt(String(b[0]).replace(/\D/g, ""), 10);
        return (Number.isFinite(ra) ? ra : 9999) - (Number.isFinite(rb) ? rb : 9999);
      });
    }

    function renderStandingsTable(headers, rows) {
      if (!rows.length) return `<div class="empty">Keine Daten.</div>`;
      const sorted = sortStandingsWithCards(rows);
      const tbody = sorted.map((r, idx) => {
        const name = r[1] || "-";
        const meta = state.playerMetaMap[normalize(name)] || {};
        const cards = [];
        for(let i=0; i<(meta.yellow||0); i++) cards.push('<span class="card-badge yellow"></span>');
        if(meta.red) cards.push('<span class="card-badge red"></span>');

        return `<tr>
          <td class="rank-col ${idx===0?'first':(idx===rows.length-1?'last':'')}">${idx+1}</td>
          <td class="player-cell">
            <span class="player-name-link" onclick="openPlayerInfo('${htmlEscape(name)}')">${htmlEscape(name)}</span>
            <div class="player-meta-row">${meta.discord ? `<span class="player-discord">${htmlEscape(meta.discord)}</span>` : ''} ${cards.join("")}</div>
          </td>
          <td align="center">${r[2]}</td><td align="center">${r[3]}</td><td align="center">${r[4]}</td><td align="center" style="font-weight:900">${r[5]}</td>
        </tr>`;
      }).join("");

      return `<div class="table-shell"><div class="section-head"><h3>Tabelle</h3></div><div class="table-wrap"><table><thead><tr><th class="rank-col">#</th><th>Spieler (Klicken für Info)</th><th style="text-align:center">S</th><th style="text-align:center">N</th><th style="text-align:center">+/-</th><th style="text-align:center">Pkt</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    async function loadLeague(ln) {
      const lr = await loadCsv(ln).catch(()=>[]);
      const er = await loadCsv(`Erg ${ln}`).catch(()=>[]);
      let tm = -1; for(let i=0; i<lr.length; i++) if(lr[i].join("").toLowerCase().includes("tabelle")) tm = i;
      const standings = [];
      if(tm !== -1) {
        for(let i=tm+1; i<lr.length; i++) {
          const p = safeCell(lr[i], 0); if(!p || isNaN(parseInt(p))) continue;
          standings.push([p, safeCell(lr[i],1), safeCell(lr[i],2), safeCell(lr[i],3), safeCell(lr[i],4), safeCell(lr[i],5)]);
        }
      }
      const grouped = new Map();
      er.forEach(r => {
        const sn = safeCell(r, 0); if(!sn || isNaN(parseInt(sn))) return;
        if(!grouped.has(sn)) grouped.set(sn, []);
        grouped.get(sn).push(r);
      });
      const matchdays = Array.from(grouped.entries()).map(([sn, rows]) => {
        const done = rows.filter(r => isFinishedMatch(safeCell(r, 7), safeCell(r, 5), safeCell(r, 6))).length;
        return { title: `Spieltag ${sn}`, doneMatches: done, totalMatches: rows.length, rows };
      }).sort((a,b) => parseInt(a.title.split(" ")[1]) - parseInt(b.title.split(" ")[1]));
      return { standings, matchdays };
    }

    async function loadAll() {
      const pRows = await loadCsv(PLAYER_SHEET).catch(()=>[]);
      state.playerMetaMap = parsePlayerDiscordSheet(pRows);
      for (const l of LEAGUES) state.leagueData[l] = await loadLeague(l);
      setMode("Autodarts");
    }

    function setMode(m) {
      state.activeMode = m; document.body.setAttribute("data-mode", m);
      const visible = LEAGUES.filter(l => l.startsWith(m) && state.leagueData[l]?.standings.length > 0);
      state.activeLeague = visible[0] || null;
      renderSubmenus(); renderLeague();
    }

    function renderSubmenus() {
      const sub = (mode, el) => {
        el.innerHTML = LEAGUES.filter(l => l.startsWith(mode) && state.leagueData[l]?.standings.length > 0).map(l => 
          `<button class="submenu-btn ${l===state.activeLeague?'active':''}" onclick="state.activeLeague='${l}';renderSubmenus();renderLeague();">${l}</button>`
        ).join("");
      };
      sub("Autodarts", document.getElementById("autodartsSubmenu"));
      sub("DartCounter", document.getElementById("dartcounterSubmenu"));
      document.getElementById("autodartsSubmenu").classList.toggle("active", state.activeMode === "Autodarts");
      document.getElementById("dartcounterSubmenu").classList.toggle("active", state.activeMode === "DartCounter");
    }

    function renderLeague() {
      const d = state.leagueData[state.activeLeague];
      tableAreaEl.innerHTML = d ? renderStandingsTable([], d.standings) : "";
      matchdayAreaEl.innerHTML = d ? d.matchdays.map(m => `
        <div class="matchday">
          <button class="matchday-head" onclick="this.parentElement.classList.toggle('open')"><span>${m.title}</span><span>${m.doneMatches}/${m.totalMatches}</span></button>
          <div class="matchday-body"><table style="width:100%">${m.rows.map(r => `<tr><td>${htmlEscape(r[1])}</td><td>${htmlEscape(r[3])}</td><td align="right">${r[5]}:${r[6]}</td></tr>`).join("")}</table></div>
        </div>`).join("") : "";
    }

    function closeModal(id) { document.getElementById(id).classList.remove("open"); }
    document.getElementById("modeAutodarts").onclick = () => setMode("Autodarts");
    document.getElementById("modeDartCounter").onclick = () => setMode("DartCounter");
    
    document.getElementById("openImpressumBtn").onclick = () => {
      document.getElementById("modalTitle").innerText = "Impressum";
      document.getElementById("modalContent").innerHTML = "<p>Hier deine Daten eintragen...</p>";
      document.getElementById("genericModal").classList.add("open");
    };

    loadAll();
  </script>
</body>
</html>
