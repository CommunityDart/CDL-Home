<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDL Season 2</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#081018;
  color:#fff;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}
.logo{
  width:70px;
}
.title-box h1{
  margin:0;
  font-size:28px;
}
.title-box p{
  margin:0;
  font-size:13px;
  color:#9fb3cc;
}

.header-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.top-link{
  border:none;
  background:#18304d;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  transition:.2s ease;
}
.top-link:hover{
  opacity:.92;
  transform:translateY(-1px);
}

.donate-btn{
  background:#00c244;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  animation:pulseDonate 1.8s infinite;
  box-shadow:0 0 0 rgba(0,194,68,0.45);
}
.donate-btn:hover{
  opacity:.94;
}

@keyframes pulseDonate{
  0%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(0,194,68,0.45);
  }
  70%{
    transform:scale(1.03);
    box-shadow:0 0 0 12px rgba(0,194,68,0);
  }
  100%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(0,194,68,0);
  }
}

.tabs-wrap{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:20px;
}
.row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button{
  border:none;
  background:#18304d;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
button.active-autodarts{
  background:#4d8cff;
}
button.active-dartcounter{
  background:#ff8c2a;
}

.card{
  background:#0f1a2b;
  border:1px solid #22324a;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
th,td{
  padding:12px 10px;
  border-bottom:1px solid #22324a;
  text-align:center;
  vertical-align:middle;
  word-break:break-word;
}
th{
  background:#142338;
  font-weight:700;
}

.player-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.discord-name{
  font-size:12px;
  color:#9fb3cc;
}

.player-link{
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.player-link:hover{
  color:#7db3ff;
}

.medal{
  font-size:18px;
  margin-right:6px;
}

.matchdays{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
.group{
  border:1px solid #22324a;
  border-radius:10px;
  overflow:hidden;
}
.group-head{
  background:#142338;
  padding:8px 10px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  font-weight:700;
  gap:8px;
}
.badge{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  white-space:nowrap;
}
.badge.offen{
  background:rgba(255,165,0,.18);
  color:#ffcc66;
}
.badge.fertig{
  background:rgba(0,200,100,.18);
  color:#8df0b0;
}

.match{
  display:grid;
  grid-template-columns:1fr auto 1fr auto;
  gap:8px;
  padding:8px 10px;
  border-top:1px solid #22324a;
  align-items:center;
}
.score{
  padding:3px 8px;
  border-radius:999px;
  background:#1a2b44;
}
.score.fertig{color:#8df0b0;}
.score.offen{color:#ffcc66;}
.state{
  font-size:11px;
  color:#9fb3cc;
  text-transform:uppercase;
}

.hidden{
  display:none !important;
}

.back-btn{
  margin-bottom:12px;
}

.regelwerk-table th,
.regelwerk-table td{
  text-align:left;
}

.empty-note{
  color:#9fb3cc;
}

@media(max-width:900px){
  .matchdays{grid-template-columns:1fr;}
}
@media(max-width:700px){
  .header{
    align-items:flex-start;
  }
  .header-actions{
    width:100%;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div class="header-left">
      <img src="./logo.png" class="logo" alt="Logo">
      <div class="title-box">
        <h1>CDL Season 2</h1>
        <p>Community Dart Liga</p>
      </div>
    </div>

    <div class="header-actions">
      <a href="#" onclick="showRegelwerkPage(); return false;" class="top-link">📘 Regelwerk</a>
      <a href="DEIN_FAQ_LINK" target="_blank" class="top-link">❓ FAQ</a>
      <a href="DEIN_PAYPAL_LINK" target="_blank" class="donate-btn">💸 Spenden</a>
    </div>
  </div>

  <!-- Liga Ansicht -->
  <div id="leagueView">
    <div class="tabs-wrap">
      <div class="row" id="platformTabs"></div>
      <div class="row" id="leagueTabs"></div>
    </div>

    <div class="card">
      <h2 id="title"></h2>
    </div>

    <div class="card">
      <h3>Tabelle</h3>
      <div id="tableBox"></div>
    </div>

    <div class="card">
      <h3>Spieltage</h3>
      <div id="matchdaysBox" class="matchdays"></div>
    </div>
  </div>

  <!-- Regelwerk Ansicht -->
  <div id="regelwerkView" class="hidden">
    <div class="card">
      <button class="top-link back-btn" onclick="showLeaguePage()">⬅ Zurück zur Liga</button>
      <h2>📘 Regelwerk</h2>
      <div id="regelwerkBox">Lädt…</div>
    </div>
  </div>

</div>

<script>
const SHEET_ID="1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

const CONFIG={
  autodarts:[
    "Autodarts Liga 1","Autodarts Liga 2","Autodarts Liga 3",
    "Autodarts Liga 4","Autodarts Liga 5","Autodarts Liga 6"
  ],
  dartcounter:[
    "DartCounter Liga 1","DartCounter Liga 2","DartCounter Liga 3",
    "DartCounter Liga 4","DartCounter Liga 5","DartCounter Liga 6"
  ]
};

let currentPlatform="autodarts";
let currentLeague=null;

const platformTabs=document.getElementById("platformTabs");
const leagueTabs=document.getElementById("leagueTabs");
const titleEl=document.getElementById("title");
const tableBox=document.getElementById("tableBox");
const matchdaysBox=document.getElementById("matchdaysBox");
const leagueView=document.getElementById("leagueView");
const regelwerkView=document.getElementById("regelwerkView");
const regelwerkBox=document.getElementById("regelwerkBox");

function gviz(sheet){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&tqx=out:json&t=${Date.now()}`;
}

async function fetchSheet(sheet){
  const res=await fetch(gviz(sheet));
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));
  return (json.table.rows || []).map(r => (r.c || []).map(c => c ? c.v : ""));
}

async function getActiveLeagues(platform){
  const leagues=CONFIG[platform];
  const active=[];

  for(const league of leagues){
    try{
      const rows=await fetchSheet(league);
      const hasPlayer=rows.some(r => r[1] && r[1] !== "Spieler 1");
      if(hasPlayer) active.push(league);
    }catch(e){
      console.log("Fehler bei Liga:", league);
    }
  }

  return active;
}

function buildDiscordMap(rows){
  const map={};
  rows.forEach(r=>{
    const player=String(r[0] ?? "").trim();
    const discord=String(r[1] ?? "").trim();
    if(player) map[player]=discord;
  });
  return map;
}

function getMedal(rank){
  if(rank==1) return "🥇";
  if(rank==2) return "🥈";
  if(rank==3) return "🥉";
  return "";
}

function renderPlatformTabs(){
  platformTabs.innerHTML="";
  Object.keys(CONFIG).forEach(key=>{
    const btn=document.createElement("button");
    btn.innerText=key==="autodarts"?"Autodarts":"DartCounter";

    if(key===currentPlatform){
      btn.classList.add(key==="autodarts"?"active-autodarts":"active-dartcounter");
    }

    btn.onclick=async()=>{
      currentPlatform=key;
      currentLeague=null;
      renderPlatformTabs();
      await renderLeagueTabs();
      loadLeague();
    };

    platformTabs.appendChild(btn);
  });
}

async function renderLeagueTabs(){
  leagueTabs.innerHTML="Lädt…";

  const leagues=await getActiveLeagues(currentPlatform);
  leagueTabs.innerHTML="";

  if(!leagues.length){
    currentLeague=null;
    leagueTabs.innerHTML="<span class='empty-note'>Keine aktive Liga</span>";
    return;
  }

  if(!currentLeague || !leagues.includes(currentLeague)){
    currentLeague=leagues[0];
  }

  leagues.forEach(l=>{
    const btn=document.createElement("button");
    btn.innerText=l;

    if(l===currentLeague){
      btn.classList.add(currentPlatform==="autodarts"?"active-autodarts":"active-dartcounter");
    }

    btn.onclick=async()=>{
      currentLeague=l;
      await renderLeagueTabs();
      loadLeague();
    };

    leagueTabs.appendChild(btn);
  });
}

function renderTable(rows, discordMap){
  let html="<table><tr><th>Platz</th><th>Spieler</th><th>Siege</th><th>Niederlagen</th><th>Leg-Diff</th><th>Punkte</th></tr>";

  for(const r of rows){
    if(!r[1]) continue;
    if(r[1]==="Spieler 1") break;

    const rank=Number(r[0]) || 0;
    const medal=getMedal(rank);
    const playerName=String(r[1] ?? "").trim();
    const discordName=discordMap[playerName] || "";

    html+=`<tr>
      <td>${medal ? `<span class="medal">${medal}</span>` : ""}${r[0]}</td>
      <td>
        <div class="player-wrap">
          <a href="#" class="player-link" onclick="return false;">${playerName}</a>
          ${discordName ? `<span class="discord-name">${discordName}</span>` : ""}
        </div>
      </td>
      <td>${r[2] ?? ""}</td>
      <td>${r[3] ?? ""}</td>
      <td>${r[4] ?? ""}</td>
      <td>${r[5] ?? ""}</td>
    </tr>`;
  }

  html+="</table>";
  tableBox.innerHTML=html;
}

function renderMatchdays(rows){
  const groups={};

  rows.forEach(r=>{
    if(!r[0] || !r[1] || !r[3]) return;

    const key="Spieltag " + r[0];

    if(!groups[key]) groups[key]=[];

    groups[key].push({
      p1:r[1],
      p2:r[3],
      score:(r[5] && r[6]) ? `${r[5]}:${r[6]}` : "offen",
      done:(r[5] && r[6])
    });
  });

  let html="";

  Object.keys(groups)
    .sort((a,b)=>Number(a.split(" ")[1]) - Number(b.split(" ")[1]))
    .forEach(key=>{
      const done=groups[key].every(m=>m.done);

      html+=`<div class="group">
        <div class="group-head">
          <span>${key}</span>
          <span class="badge ${done ? "fertig" : "offen"}">${done ? "fertig" : "offen"}</span>
        </div>`;

      groups[key].forEach(m=>{
        html+=`<div class="match">
          <div>${m.p1}</div>
          <div class="score ${m.done ? "fertig" : "offen"}">${m.score}</div>
          <div>${m.p2}</div>
          <div class="state">${m.done ? "fertig" : "offen"}</div>
        </div>`;
      });

      html+="</div>";
    });

  matchdaysBox.innerHTML=html || "Keine Spieltage gefunden.";
}

function renderRegelwerkTable(rows){
  const normalized = rows
    .map(r => r.map(v => String(v ?? "").trim()))
    .filter(r => r.some(v => v !== ""));

  if(!normalized.length){
    regelwerkBox.innerHTML = "Kein Regelwerk gefunden.";
    return;
  }

  const maxCols = Math.max(...normalized.map(r => r.length));

  let html = `<table class="regelwerk-table">`;

  normalized.forEach((row, rowIndex) => {
    html += "<tr>";
    for(let i = 0; i < maxCols; i++){
      const value = row[i] ?? "";
      const tag = rowIndex === 0 ? "th" : "td";
      html += `<${tag}>${value}</${tag}>`;
    }
    html += "</tr>";
  });

  html += "</table>";
  regelwerkBox.innerHTML = html;
}

async function showRegelwerkPage(){
  leagueView.classList.add("hidden");
  regelwerkView.classList.remove("hidden");
  regelwerkBox.innerHTML = "Lädt…";

  try{
    const rows = await fetchSheet("Regelwerk");
    renderRegelwerkTable(rows);
  }catch(err){
    console.error(err);
    regelwerkBox.innerHTML = "Fehler beim Laden des Regelwerks.";
  }
}

function showLeaguePage(){
  regelwerkView.classList.add("hidden");
  leagueView.classList.remove("hidden");
}

async function loadLeague(){
  if(!currentLeague){
    titleEl.innerText="Keine aktive Liga";
    tableBox.innerHTML="";
    matchdaysBox.innerHTML="";
    return;
  }

  titleEl.innerText=currentLeague;
  tableBox.innerHTML="Lädt…";
  matchdaysBox.innerHTML="Lädt…";

  const [liga, erg, spieler] = await Promise.all([
    fetchSheet(currentLeague),
    fetchSheet("Erg " + currentLeague),
    fetchSheet("Spieler_Discord")
  ]);

  const discordMap=buildDiscordMap(spieler);

  renderTable(liga, discordMap);
  renderMatchdays(erg);
}

async function init(){
  renderPlatformTabs();
  await renderLeagueTabs();
  loadLeague();
}

init();
</script>

</body>
</html>
