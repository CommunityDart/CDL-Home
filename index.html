<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dart Liga</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02131b;
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  margin:0 0 10px;
}

.top{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

button{
  padding:10px 15px;
  border:none;
  background:#083042;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

button.active{
  background:#0c4c6a;
}

.leagues{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.league{
  background:#062634;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.league.active{
  background:#0c4c6a;
}

.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.table{
  background:#041c28;
  padding:10px;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.rank{
  font-weight:bold;
}

.matches{
  background:#041c28;
  padding:10px;
  border-radius:10px;
}

.matchday{
  margin-bottom:10px;
  background:#062634;
  border-radius:8px;
}

.matchday h3{
  margin:0;
  padding:10px;
  cursor:pointer;
}

.match-list{
  display:none;
  padding:10px;
}

.matchday.open .match-list{
  display:block;
}

.match{
  padding:6px 0;
  font-size:14px;
}

.status{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="wrap">
<h1>Dart Liga</h1>

<div class="top">
<button id="autoBtn" class="active">Autodarts</button>
<button id="dcBtn">DartCounter</button>
</div>

<div id="leagues" class="leagues"></div>

<div class="main">
<div id="table" class="table"></div>
<div id="matches" class="matches"></div>
</div>

</div>

<script>
const SHEET = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

let mode = "Autodarts";
let leagues = [];
let activeLeague = "";

function csv(sheet){
  return `https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
}

async function load(sheet){
  const res = await fetch(csv(sheet));
  const text = await res.text();
  return text.split("\n").map(r=>r.split(","));
}

function renderLeagues(){
  const el = document.getElementById("leagues");
  const list = leagues.filter(l=>l.includes(mode));

  el.innerHTML = list.map(l=>
    `<div class="league ${l===activeLeague?'active':''}" onclick="selectLeague('${l}')">${l}</div>`
  ).join("");

  if(!activeLeague) selectLeague(list[0]);
}

async function selectLeague(l){
  activeLeague = l;
  renderLeagues();
  loadLeague(l);
}

async function loadLeague(name){
  const tableData = await load(name);
  const matchData = await load("Erg "+name);

  renderTable(tableData);
  renderMatches(matchData);
}

function renderTable(rows){
  let start = rows.findIndex(r=>r[0] && !isNaN(r[0]));
  if(start === -1){
    document.getElementById("table").innerHTML = "Keine Tabelle";
    return;
  }

  let html = "<table>";

  for(let i=start;i<start+20;i++){
    let r = rows[i];
    if(!r || !r[0]) break;

    html += `<tr>
      <td class="rank">${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[4] || ""}</td>
    </tr>`;
  }

  html += "</table>";
  document.getElementById("table").innerHTML = html;
}

function renderMatches(rows){
  let grouped = {};

  rows.forEach(r=>{
    let text = r.join(" ");
    let match = text.match(/Spieltag\s*\d+/i);
    if(!match) return;

    let day = match[0];
    if(!grouped[day]) grouped[day] = [];

    grouped[day].push(r);
  });

  let html = "";

  Object.keys(grouped).forEach(day=>{
    html += `<div class="matchday">
      <h3 onclick="this.parentElement.classList.toggle('open')">${day}</h3>
      <div class="match-list">`;

    grouped[day].forEach(r=>{
      html += `<div class="match">
        ${r[1]} vs ${r[3]} 
        <span class="status">${r[7]}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("matches").innerHTML = html;
}

document.getElementById("autoBtn").onclick=()=>{
  mode="Autodarts";
  activeLeague="";
  renderLeagues();
};

document.getElementById("dcBtn").onclick=()=>{
  mode="DartCounter";
  activeLeague="";
  renderLeagues();
};

leagues = [
"Autodarts Liga 1","Autodarts Liga 2","Autodarts Liga 3",
"Autodarts Liga 4","Autodarts Liga 5","Autodarts Liga 6",
"DartCounter Liga 1","DartCounter Liga 2","DartCounter Liga 3",
"DartCounter Liga 4","DartCounter Liga 5","DartCounter Liga 6"
];

renderLeagues();
</script>

</body>
</html>
