<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDL Season 2</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#081018;
  color:#fff;
  transition:.3s;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{width:70px;}

.title-box h1{margin:0;font-size:28px;}
.title-box p{margin:0;font-size:13px;color:#9fb3cc;}

.header-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* BUTTONS */
.top-link{
  background:#18304d;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  text-decoration:none;
}

button{
  background:#18304d;
  color:#fff;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

button.active-autodarts{background:#4d8cff;}
button.active-dartcounter{background:#ff8c2a;}

/* DISCORD BUTTON PRO */
.discord-btn{
  background:#5865F2;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:8px;
  position:relative;
  box-shadow:0 0 15px rgba(88,101,242,0.6);
  transition:.2s;
}

.discord-btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 0 25px rgba(88,101,242,0.9);
}

.discord-icon{
  width:18px;
  filter:invert(1);
}

/* CARD */
.card{
  background:#0f1a2b;
  border:1px solid #22324a;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{background:#142338;padding:12px;}
td{padding:12px;border-bottom:1px solid #22324a;}

.player-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.discord-name{
  font-size:12px;
  color:#9fb3cc;
}

/* MATCH */
.matchdays{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.group{
  border:1px solid #22324a;
  border-radius:10px;
}

.group-head{
  background:#142338;
  padding:8px 10px;
  display:flex;
  justify-content:space-between;
}

.match{
  display:grid;
  grid-template-columns:1fr auto 1fr auto;
  padding:8px 10px;
  border-top:1px solid #22324a;
}

.score{
  background:#1a2b44;
  padding:4px 8px;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid #22324a;
  margin-top:30px;
  color:#9fb3cc;
}

footer a{
  color:#7db3ff;
  text-decoration:none;
}

.footer-donate{
  color:#00e676;
  font-weight:700;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  max-width:600px;
  margin:80px auto;
  background:#0f1a2b;
  padding:20px;
  border-radius:12px;
  position:relative;
}

.close-btn{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

/* THEMES */
body.dartcounter-mode{
  background:#140d05;
}

body.dartcounter-mode .card{
  background:#1a120a;
  border-color:#50331d;
}

body.dartcounter-mode th,
body.dartcounter-mode .group-head{
  background:#2b1a0f;
}

@media(max-width:900px){
  .matchdays{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <div class="header-left">
    <img src="./logo.png" class="logo">
    <div class="title-box">
      <h1>CDL Season 2</h1>
      <p>Community Dart Liga</p>
    </div>
  </div>

  <div class="header-actions">
    <a href="#" onclick="showSheetPage('Regelwerk','Regelwerk')" class="top-link">📘 Regelwerk</a>
    <a href="#" onclick="showSheetPage('FAQ','FAQ')" class="top-link">❓ FAQ</a>

    <a href="DEIN_DISCORD_LINK" target="_blank" class="discord-btn">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" class="discord-icon">
      Community beitreten
    </a>
  </div>
</div>

<div id="leagueView">
  <div id="platformTabs"></div>
  <div id="leagueTabs"></div>

  <div class="card">
    <h2 id="title"></h2>
  </div>

  <div class="card">
    <h3>Tabelle</h3>
    <div id="tableBox"></div>
  </div>

  <div class="card">
    <h3>Spieltage</h3>
    <div id="matchdaysBox" class="matchdays"></div>
  </div>
</div>

</div>

<footer>
  © CDL Season 2 ·
  <a href="#" onclick="openImpressum()">Impressum</a> ·
  <a href="DEIN_PAYPAL_LINK" target="_blank" class="footer-donate">💸 Spenden</a>
</footer>

<div id="impressumModal" class="modal" onclick="closeImpressum()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-btn" onclick="closeImpressum()">✕</span>
    <h2>Impressum</h2>
    <p>Deine Daten hier</p>
  </div>
</div>

<script>
const SHEET_ID="1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

function gviz(sheet){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheet}&tqx=out:json`;
}

async function fetchSheet(sheet){
  const res=await fetch(gviz(sheet));
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows.map(r=>r.c.map(c=>c?c.v:""));
}

function applyTheme(platform){
  document.body.classList.toggle("dartcounter-mode", platform==="dartcounter");
}

function openImpressum(){
  document.getElementById("impressumModal").style.display="block";
}

function closeImpressum(){
  document.getElementById("impressumModal").style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeImpressum();
});
</script>

</body>
</html>
