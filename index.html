<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDL Season 2</title>

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#0b1220;
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{width:60px;}

.title h1{margin:0;font-size:26px;}
.title p{margin:0;font-size:12px;color:#8fa3c7;}

.header-actions a{
  background:#18263f;
  padding:10px 14px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-weight:600;
  margin-left:8px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:10px 16px;
  border-radius:8px;
  background:#18263f;
  cursor:pointer;
  font-weight:600;
}

.tab.active-blue{background:#4d8cff;}
.tab.active-orange{background:#ff8c2a;}

/* CARDS */
.card{
  background:#111b2e;
  border:1px solid #1f2e47;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#16233a;
  padding:12px;
  font-size:12px;
  text-transform:uppercase;
  color:#8fa3c7;
}

td{
  padding:12px;
  border-bottom:1px solid #1f2e47;
}

tr:hover{
  background:#16233a;
}

.player{
  display:flex;
  flex-direction:column;
}

.discord{
  font-size:11px;
  color:#8fa3c7;
}

/* MATCHES */
.matchdays{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.matchday{
  border:1px solid #1f2e47;
  border-radius:12px;
  overflow:hidden;
}

.matchday-header{
  background:#16233a;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.match{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  padding:8px 12px;
  border-top:1px solid #1f2e47;
}

.score{
  background:#1f2e47;
  padding:4px 10px;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid #1f2e47;
  color:#8fa3c7;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  background:#111b2e;
  max-width:600px;
  margin:80px auto;
  padding:20px;
  border-radius:12px;
  position:relative;
}

.close{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

@media(max-width:800px){
  .matchdays{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <div class="header-left">
    <img src="logo.png" class="logo">
    <div class="title">
      <h1>CDL Season 2</h1>
      <p>Community Dart Liga</p>
    </div>
  </div>

  <div class="header-actions">
    <a href="#">📘 Regelwerk</a>
    <a href="#">❓ FAQ</a>
  </div>
</div>

<div class="tabs">
  <div class="tab active-blue">Autodarts</div>
  <div class="tab">DartCounter</div>
</div>

<div class="card">
<h3>Tabelle</h3>
<table>
<tr>
<th>#</th><th>Spieler</th><th>S</th><th>N</th><th>LD</th><th>P</th>
</tr>

<tr>
<td>1</td>
<td>
<div class="player">
Max Mustermann
<span class="discord">@max</span>
</div>
</td>
<td>5</td><td>1</td><td>+10</td><td>15</td>
</tr>

</table>
</div>

<div class="card">
<h3>Spieltage</h3>

<div class="matchdays">

<div class="matchday">
<div class="matchday-header">
<span>Spieltag 1</span>
<span>offen</span>
</div>

<div class="match">
<span>Max</span>
<span class="score">3:2</span>
<span>Tom</span>
</div>

</div>

</div>

</div>

</div>

<footer>
© CDL · <a href="#" onclick="openImpressum()">Impressum</a>
</footer>

<div id="modal" class="modal" onclick="closeImpressum()">
<div class="modal-content" onclick="event.stopPropagation()">
<span class="close" onclick="closeImpressum()">✕</span>

<h2>Impressum</h2>
<p>Deine Daten hier</p>

</div>
</div>

<script>
function openImpressum(){
  document.getElementById("modal").style.display="block";
}

function closeImpressum(){
  document.getElementById("modal").style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeImpressum();
});
</script>

</body>
</html>
