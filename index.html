<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dart Liga</title>

<style>
:root{
  --bg:#03131b;
  --green:#3ddc97;
  --red:#e74c3c;
  --text:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.wrap{max-width:1200px;margin:auto;padding:20px}

/* Spieler */
.player-name,.player-discord,.match-player{
  display:block;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.player-name{font-weight:800}
.player-discord{font-size:12px;color:#8ec9ee}

/* Status */
.status-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
}

.status-dot.done{
  background:var(--green);
  box-shadow:0 0 10px rgba(61,220,151,.6);
}

.status-dot.open{
  background:var(--red);
  box-shadow:0 0 10px rgba(231,76,60,.6);
}

.status-badge{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
}

/* Matchday */
.matchday{
  margin-bottom:12px;
  border:1px solid #123;
  border-radius:10px;
  overflow:hidden;
}

.matchday-head{
  padding:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.matchday-body{
  display:none;
  padding:10px;
}

.matchday.open .matchday-body{
  display:block;
}

/* Tabellen */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  padding:8px;
  border-bottom:1px solid #123;
}

.match-player{
  max-width:120px;
}

/* Spalten */
.col-player{width:35%}
.col-legs{width:10%;text-align:center}
.col-status{width:60px;text-align:center}

</style>
</head>

<body>
<div class="wrap">

<h1>Community Dart Liga</h1>

<div id="tableArea"></div>
<div id="matchdayArea"></div>

</div>

<script>

const SHEET_ID="1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";
const PLAYER_SHEET="Spieler_Discord";

const LEAGUES=["Autodarts Liga 1"];

const state={
  leagueData:{},
  playerDiscordMap:{},
  activeLeague:null
};

function normalize(v){return String(v||"").toLowerCase().trim()}

function csvUrl(sheet){
 return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`
}

async function loadCsv(sheet){
 const r=await fetch(csvUrl(sheet));
 const t=await r.text();
 return t.split("\n").map(r=>r.split(","));
}

function parsePlayer(rows){
 const map={}
 rows.forEach(r=>{
   if(!r[0])return
   map[normalize(r[0])]=r[1]
 })
 return map
}

function parseStandings(rows){
 return rows.slice(1)
}

function parseMatchdays(rows){
 const map={}
 rows.forEach(r=>{
   if(!r[0])return
   const tag="Spieltag "+r[0]
   if(!map[tag])map[tag]=[]
   map[tag].push(r)
 })
 return Object.entries(map).map(([title,rows])=>({title,rows}))
}

/* ===== FIX HIER ===== */
function renderStatus(s){
 const done=/fertig/i.test(s)
 return `
   <span class="status-badge" title="${done?"Fertig":"Offen"}">
     <span class="status-dot ${done?"done":"open"}"></span>
   </span>
 `
}
/* ==================== */

function renderTable(rows){
 return `
<table>
<tr><th>Platz</th><th>Spieler</th><th>S</th><th>N</th><th>Diff</th><th>P</th></tr>
${rows.map(r=>{
 const name=r[1]
 const dc=state.playerDiscordMap[normalize(name)]||""
 return `
<tr>
<td>${r[0]}</td>
<td>
<span class="player-name" title="${name}">${name}</span>
<span class="player-discord" title="${dc}">${dc}</span>
</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td>${r[5]}</td>
</tr>`
}).join("")}
</table>`
}

function renderMatchTable(rows){
 return `
<table>
<tr>
<th class="col-player">Spieler 1</th>
<th class="col-player">Spieler 2</th>
<th class="col-legs">L1</th>
<th class="col-legs">L2</th>
<th class="col-status">S</th>
</tr>
${rows.map(r=>`
<tr>
<td><span class="match-player" title="${r[1]}">${r[1]}</span></td>
<td><span class="match-player" title="${r[3]}">${r[3]}</span></td>
<td>${r[5]}</td>
<td>${r[6]}</td>
<td>${renderStatus(r[7])}</td>
</tr>
`).join("")}
</table>`
}

function renderMatchdays(days){
 return days.map((d,i)=>`
<div class="matchday ${i===0?"open":""}">
<div class="matchday-head">${d.title}</div>
<div class="matchday-body">${renderMatchTable(d.rows)}</div>
</div>`).join("")
}

async function loadAll(){

 const player=await loadCsv(PLAYER_SHEET)
 state.playerDiscordMap=parsePlayer(player)

 for(const l of LEAGUES){
   const league=await loadCsv(l)
   const erg=await loadCsv("Erg "+l)

   state.leagueData[l]={
     table:parseStandings(league),
     days:parseMatchdays(erg)
   }
 }

 state.activeLeague=LEAGUES[0]
 render()
}

function render(){
 const d=state.leagueData[state.activeLeague]
 document.getElementById("tableArea").innerHTML=renderTable(d.table)
 document.getElementById("matchdayArea").innerHTML=renderMatchdays(d.days)

 document.querySelectorAll(".matchday-head").forEach(el=>{
   el.onclick=()=>el.parentElement.classList.toggle("open")
 })
}

loadAll()

</script>
</body>
</html>
