<script>
function parseTable(rows){
  const cleanedRows = rows
    .map(r => {
      const copy = [...r];
      while (copy.length < 6) copy.push("");
      return copy.slice(0, 6).map(clean);
    })
    .filter(r => r.some(v => v !== ""));

  const tableRows = [];

  for (const row of cleanedRows) {
    const a = row[0];
    const b = row[1];
    const c = row[2];
    const d = row[3];
    const e = row[4];
    const f = row[5];

    // Sobald der Spieltags-/Matchbereich beginnt -> Tabelle beenden
    if (
      /^spieler 1$/i.test(b) ||
      /^discord 1$/i.test(c) ||
      /^spieler 2$/i.test(d) ||
      /^discord 2$/i.test(e)
    ) {
      break;
    }

    const looksLikeTableRow =
      isNumericOnly(a) &&
      isTextPlayer(b) &&
      (c === "" || isNumericOnly(c)) &&
      (d === "" || isNumericOnly(d)) &&
      (e === "" || /^-?\d+$/.test(e)) &&
      (f === "" || isNumericOnly(f));

    if (looksLikeTableRow) {
      tableRows.push([a, b, c, d, e, f]);
    }
  }

  return {
    tableCols: ["Platz", "Spieler", "Siege", "Niederlagen", "Leg-Diff", "Punkte"],
    tableRows
  };
}
</script>
