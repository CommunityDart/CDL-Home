<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDL Season 2</title>

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  background:#0b1220;
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{width:60px;}

.title-box h1{margin:0;font-size:26px;}
.title-box p{margin:0;font-size:12px;color:#8fa3c7;}

/* BUTTONS */
.top-link, button{
  background:#18263f;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
  border:none;
  cursor:pointer;
}

button.active-autodarts{background:#4d8cff;}
button.active-dartcounter{background:#ff8c2a;}

/* CARD */
.card{
  background:#111b2e;
  border:1px solid #1f2e47;
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{
  background:#16233a;
  padding:12px;
  font-size:12px;
  color:#8fa3c7;
}
td{
  padding:12px;
  border-bottom:1px solid #1f2e47;
}

.player-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.discord-name{
  font-size:11px;
  color:#8fa3c7;
}

/* MATCH */
.matchdays{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.group{
  border:1px solid #1f2e47;
  border-radius:12px;
}

.group-head{
  background:#16233a;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.match{
  display:grid;
  grid-template-columns:1fr auto 1fr auto;
  padding:8px 10px;
  border-top:1px solid #1f2e47;
}

.score{
  background:#1f2e47;
  padding:4px 10px;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid #1f2e47;
  margin-top:30px;
  color:#8fa3c7;
}

footer a{
  color:#7db3ff;
  text-decoration:none;
  margin:0 10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  max-width:600px;
  margin:80px auto;
  background:#111b2e;
  padding:20px;
  border-radius:12px;
  position:relative;
}

.close-btn{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <div class="header-left">
    <img src="./logo.png" class="logo">
    <div class="title-box">
      <h1>CDL Season 2</h1>
      <p>Community Dart Liga</p>
    </div>
  </div>

  <div>
    <a href="#" onclick="showSheetPage('Regelwerk','📘 Regelwerk')" class="top-link">📘 Regelwerk</a>
    <a href="#" onclick="showSheetPage('FAQ','❓ FAQ')" class="top-link">❓ FAQ</a>
  </div>
</div>

<div id="leagueView">
  <div id="platformTabs"></div>
  <div id="leagueTabs"></div>

  <div class="card">
    <h2 id="title"></h2>
  </div>

  <div class="card">
    <h3>Tabelle</h3>
    <div id="tableBox"></div>
  </div>

  <div class="card">
    <h3>Spieltage</h3>
    <div id="matchdaysBox" class="matchdays"></div>
  </div>
</div>

<div id="sheetPageView" class="hidden">
  <button onclick="showLeaguePage()">⬅ Zurück</button>
  <h2 id="sheetPageTitle"></h2>
  <div id="sheetPageBox"></div>
</div>

</div>

<footer>
  © CDL Season 2 ·
  <a href="#" onclick="openImpressum(); return false;">Impressum</a>
  ·
  <a href="DEIN_PAYPAL_LINK" target="_blank">💸 Spenden</a>
</footer>

<!-- IMPRESSUM -->
<div id="impressumModal" class="modal" onclick="closeImpressum()">
  <div class="modal-content" onclick="event.stopPropagation()">

    <span class="close-btn" onclick="closeImpressum()">✕</span>

    <h2>📄 Impressum</h2>

    <p>
      Max Mustermann<br>
      Musterstraße 1<br>
      12345 Musterstadt<br><br>
      E-Mail: deine@email.de
    </p>

  </div>
</div>

<script>
const SHEET_ID="1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

function gviz(sheet){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheet}&tqx=out:json`;
}

async function fetchSheet(sheet){
  const res=await fetch(gviz(sheet));
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows.map(r=>r.c.map(c=>c?c.v:""));
}

async function showSheetPage(name,title){
  document.getElementById("leagueView").style.display="none";
  document.getElementById("sheetPageView").style.display="block";
  document.getElementById("sheetPageTitle").innerText=title;

  const rows=await fetchSheet(name);

  let html="<table>";
  rows.forEach(r=>{
    html+="<tr>";
    r.forEach(c=>html+=`<td>${c||""}</td>`);
    html+="</tr>";
  });
  html+="</table>";

  document.getElementById("sheetPageBox").innerHTML=html;
}

function showLeaguePage(){
  document.getElementById("leagueView").style.display="block";
  document.getElementById("sheetPageView").style.display="none";
}

/* IMPRESSUM */
function openImpressum(){
  document.getElementById("impressumModal").style.display="block";
}

function closeImpressum(){
  document.getElementById("impressumModal").style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeImpressum();
});
</script>

</body>
</html>
