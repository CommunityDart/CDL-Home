<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDL Season 2</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#081018;color:#fff;}
.wrap{max-width:1200px;margin:auto;padding:20px;}

.header{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:15px;}
.logo{width:70px;}

.title-box h1{margin:0;font-size:28px;}
.title-box p{margin:0;font-size:13px;color:#9fb3cc;}

.header-actions{display:flex;flex-wrap:wrap;gap:10px;}

.top-link{
  background:#18304d;color:#fff;padding:10px 14px;border-radius:8px;
  font-weight:700;text-decoration:none;
}

.donate-btn{
  background:#00c244;color:#fff;padding:10px 16px;border-radius:8px;
  font-weight:700;text-decoration:none;
}

button{
  background:#18304d;color:#fff;padding:10px 14px;border:none;
  border-radius:8px;font-weight:700;cursor:pointer;
}

button.active-autodarts{background:#4d8cff;}
button.active-dartcounter{background:#ff8c2a;}

.card{
  background:#0f1a2b;border:1px solid #22324a;
  border-radius:14px;padding:16px;margin-bottom:16px;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:12px 10px;border-bottom:1px solid #22324a;text-align:center;}
th{background:#142338;}

.player-wrap{display:flex;flex-direction:column;align-items:center;}
.discord-name{font-size:12px;color:#9fb3cc;}

.matchdays{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.group{border:1px solid #22324a;border-radius:10px;overflow:hidden;}
.group-head{background:#142338;padding:8px 10px;display:flex;justify-content:space-between;}

.match{
  display:grid;grid-template-columns:1fr auto 1fr auto;
  padding:8px 10px;border-top:1px solid #22324a;
}

.hidden{display:none;}

footer{
  text-align:center;
  padding:20px;
  border-top:1px solid #22324a;
  margin-top:30px;
  color:#9fb3cc;
}

footer a{color:#7db3ff;text-decoration:none;}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:9999;
  padding:20px;
}

.modal-content{
  max-width:700px;
  margin:auto;
  background:#0f1a2b;
  border:1px solid #22324a;
  border-radius:14px;
  padding:20px;
  position:relative;
}

.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#18304d;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <div class="header-left">
    <img src="./logo.png" class="logo">
    <div class="title-box">
      <h1>CDL Season 2</h1>
      <p>Community Dart Liga</p>
    </div>
  </div>

  <div class="header-actions">
    <a href="#" onclick="showSheetPage('Regelwerk','📘 Regelwerk')" class="top-link">📘 Regelwerk</a>
    <a href="#" onclick="showSheetPage('FAQ','❓ FAQ')" class="top-link">❓ FAQ</a>
    <a href="DEIN_PAYPAL_LINK" class="donate-btn">💸 Spenden</a>
  </div>
</div>

<div id="leagueView">
  <div id="platformTabs"></div>
  <div id="leagueTabs"></div>

  <div class="card">
    <h2 id="title"></h2>
  </div>

  <div class="card">
    <h3>Tabelle</h3>
    <div id="tableBox"></div>
  </div>

  <div class="card">
    <h3>Spieltage</h3>
    <div id="matchdaysBox" class="matchdays"></div>
  </div>
</div>

<div id="sheetPageView" class="hidden">
  <button onclick="showLeaguePage()">⬅ Zurück</button>
  <h2 id="sheetPageTitle"></h2>
  <div id="sheetPageBox"></div>
</div>

</div>

<footer>
  © CDL Season 2 · 
  <a href="#" onclick="openImpressum(); return false;">Impressum</a>
</footer>

<!-- IMPRESSUM -->
<div id="impressumModal" class="modal" onclick="closeImpressum()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeImpressum()">✕</button>

    <h2>📄 Impressum</h2>

    <p>
      Max Mustermann<br>
      Musterstraße 1<br>
      12345 Musterstadt<br><br>
      E-Mail: deine@email.de
    </p>
  </div>
</div>

<script>
const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

const CONFIG = {
  autodarts:["Autodarts Liga 1","Autodarts Liga 2"],
  dartcounter:["DartCounter Liga 1","DartCounter Liga 2"]
};

let currentPlatform="autodarts";
let currentLeague=null;

async function fetchSheet(sheet){
  const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheet}&tqx=out:json`);
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows.map(r=>r.c.map(c=>c?c.v:""));
}

async function loadLeague(){
  if(!currentLeague) return;
  const liga=await fetchSheet(currentLeague);

  let html="<table><tr><th>#</th><th>Spieler</th></tr>";
  liga.forEach(r=>{
    if(!r[1]) return;
    html+=`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`;
  });
  html+="</table>";

  document.getElementById("tableBox").innerHTML=html;
}

function openImpressum(){
  document.getElementById("impressumModal").style.display="block";
}

function closeImpressum(){
  document.getElementById("impressumModal").style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeImpressum();
});
</script>

</body>
</html>
