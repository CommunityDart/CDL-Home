<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Community Dart Liga</title>

  <style>
    :root{
      --bg:#04101d;
      --bg2:#020912;
      --panel:#081a33;
      --panel2:#0d2444;
      --line:#1a3a63;
      --text:#ffffff;
      --muted:#9bb6d8;
      --blue:#53a8ff;
      --green:#4ef08b;
      --orange:#ffbe55;
      --shadow:0 0 0 1px rgba(83,168,255,.14),0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(45,111,189,.18), transparent 35%),
        linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      min-height:100vh;
    }

    .wrap{
      width:min(1280px, calc(100% - 24px));
      margin:16px auto 40px;
    }

    .hero{
      background:linear-gradient(180deg, rgba(8,26,51,.96), rgba(6,20,39,.96));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px 22px;
      margin-bottom:18px;
    }

    .eyebrow{
      color:var(--blue);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:12px;
      margin-bottom:6px;
    }

    h1{
      margin:0 0 6px;
      font-size:36px;
      line-height:1.05;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
    }

    .top-grid{
      display:grid;
      grid-template-columns:1.4fr repeat(3, minmax(180px, 220px));
      gap:12px;
      margin-bottom:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(8,26,51,.98), rgba(7,20,39,.98));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
    }

    .stat{
      padding:18px;
      min-height:98px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .stat .label{
      color:#bdd3ee;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-bottom:6px;
    }

    .stat .value{
      font-size:18px;
      font-weight:700;
      line-height:1.2;
    }

    .stat .big{
      font-size:46px;
      line-height:1;
      font-weight:800;
    }

    .blue{color:var(--blue)}
    .orange{color:var(--orange)}
    .green{color:var(--green)}

    .league{
      margin-top:18px;
      overflow:hidden;
    }

    .league-head{
      background:linear-gradient(180deg, rgba(11,31,60,.98), rgba(9,24,47,.98));
      border-bottom:1px solid var(--line);
      padding:18px 20px;
    }

    .league-title{
      margin:0;
      font-size:22px;
      font-weight:800;
    }

    .league-body{
      padding:16px;
    }

    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(83,168,255,.08);
      color:#d8e8fb;
      font-size:13px;
    }

    .section-title{
      margin:0 0 14px;
      font-size:16px;
      color:#e4effc;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid rgba(83,168,255,.10);
      border-radius:14px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
    }

    thead th{
      background:#132a4b;
      color:#fff;
      padding:13px 12px;
      border-bottom:1px solid var(--line);
      text-align:center;
      white-space:nowrap;
    }

    tbody td{
      padding:13px 12px;
      border-bottom:1px solid rgba(83,168,255,.14);
      text-align:center;
      color:#fff;
    }

    tbody tr:hover{
      background:rgba(83,168,255,.05);
    }

    td.player{
      text-align:left;
      font-weight:700;
    }

    .medal{
      margin-right:6px;
    }

    .empty,
    .loading,
    .error{
      padding:24px;
      text-align:center;
      color:var(--muted);
    }

    .error{
      color:#ffd0d0;
    }

    .footer{
      text-align:center;
      color:#7fa3cb;
      font-size:13px;
      margin-top:18px;
    }

    @media (max-width: 980px){
      .top-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width: 640px){
      .top-grid{
        grid-template-columns:1fr;
      }

      h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Community Dart Liga</div>
      <h1>Tabellen & Spieltage</h1>
      <div class="sub">Automatisch aus Google Sheets geladen</div>
    </section>

    <section class="top-grid">
      <div class="card stat">
        <div class="label">Aktueller Spieltag</div>
        <div class="value" id="currentMatchdayText">Lädt...</div>
        <div class="sub" id="currentMatchdaySub">Bitte warten</div>
      </div>

      <div class="card stat">
        <div class="label">Begegnungen</div>
        <div class="big blue" id="matchesCount">-</div>
      </div>

      <div class="card stat">
        <div class="label">Offen</div>
        <div class="big orange" id="openCount">-</div>
      </div>

      <div class="card stat">
        <div class="label">Fertig</div>
        <div class="big green" id="doneCount">-</div>
      </div>
    </section>

    <div id="content" class="loading card">Daten werden geladen...</div>

    <div class="footer">Community Dart Liga</div>
  </div>

  <script>
    /************************************************************
     * HIER DEINE SHEET-ID EINTRAGEN
     ************************************************************/
    const SPREADSHEET_ID = "DEINE_SPREADSHEET_ID_HIER";

    /************************************************************
     * LIGA-BLÄTTER
     ************************************************************/
    const LEAGUE_SHEETS = [
      "Autodarts Liga 1",
      "Autodarts Liga 2",
      "Autodarts Liga 3",
      "Autodarts Liga 4",
      "Autodarts Liga 5",
      "Autodarts Liga 6",
      "Dartcounter Liga 1",
      "Dartcounter Liga 2",
      "Dartcounter Liga 3",
      "Dartcounter Liga 4",
      "Dartcounter Liga 5",
      "Dartcounter Liga 6"
    ];

    /************************************************************
     * HILFSFUNKTIONEN
     ************************************************************/
    function normalize(str){
      return String(str ?? "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ")
        .replace(/[ä]/g, "ae")
        .replace(/[ö]/g, "oe")
        .replace(/[ü]/g, "ue")
        .replace(/[ß]/g, "ss");
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function toNumber(value){
      if (value === null || value === undefined || value === "") return 0;
      const cleaned = String(value)
        .trim()
        .replace(/\./g, "")
        .replace(",", ".")
        .replace(/[^\d.-]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function isFinishedStatus(value){
      const v = normalize(value);
      return v === "fertig" || v.includes("fertig") || v.includes("abgeschlossen");
    }

    function isOpenStatus(value){
      const v = normalize(value);
      return v === "offen" || v.includes("offen") || v.includes("ausstehend");
    }

    function medalForPlace(place){
      if (place === 1) return "🥇";
      if (place === 2) return "🥈";
      if (place === 3) return "🥉";
      return "";
    }

    function getSheetUrl(sheetName){
      return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    }

    async function fetchSheetRows(sheetName){
      const res = await fetch(getSheetUrl(sheetName));
      if (!res.ok) throw new Error(`Fehler beim Laden von ${sheetName}`);

      const text = await res.text();
      const jsonText = text
        .replace(/^\/\*O_o\*\/\s*/, "")
        .replace(/^google\.visualization\.Query\.setResponse\(/, "")
        .replace(/\);\s*$/, "");

      const data = JSON.parse(jsonText);
      const rows = data.table?.rows || [];

      return rows.map(row =>
        (row.c || []).map(cell => {
          if (!cell) return "";
          return cell.f ?? cell.v ?? "";
        })
      );
    }

    function findMatchHeaderRow(rows){
      for (let i = 0; i < rows.length; i++) {
        const line = rows[i].map(normalize);

        const hasSpieler1 = line.some(v => v === "spieler 1" || v.includes("spieler 1"));
        const hasSpieler2 = line.some(v => v === "spieler 2" || v.includes("spieler 2"));
        const hasLegs1 = line.some(v => v === "legs 1" || v.includes("legs 1"));
        const hasLegs2 = line.some(v => v === "legs 2" || v.includes("legs 2"));
        const hasGewinner = line.some(v => v === "gewinner" || v.includes("gewinner"));
        const hasStatus = line.some(v => v === "status" || v.includes("status"));

        if (hasSpieler1 && hasSpieler2 && hasLegs1 && hasLegs2 && hasGewinner && hasStatus) {
          return i;
        }
      }
      return -1;
    }

    function mapMatchHeaderIndexes(headerRow){
      const map = {};

      headerRow.forEach((cell, index) => {
        const h = normalize(cell);

        if (h === "spieltag" || h.includes("spieltag")) map.spieltag = index;
        if (h === "spieler 1" || h.includes("spieler 1")) map.spieler1 = index;
        if (h === "spieler 2" || h.includes("spieler 2")) map.spieler2 = index;
        if (h === "legs 1" || h.includes("legs 1")) map.legs1 = index;
        if (h === "legs 2" || h.includes("legs 2")) map.legs2 = index;
        if (h === "gewinner" || h.includes("gewinner")) map.gewinner = index;
        if (h === "status" || h.includes("status")) map.status = index;
      });

      return map;
    }

    function createEmptyPlayer(name){
      return {
        spieler: name,
        siege: 0,
        niederlagen: 0,
        legPlus: 0,
        legMinus: 0,
        legDiff: 0,
        punkte: 0,
        spiele: 0
      };
    }

    function ensurePlayer(tableMap, name){
      const clean = String(name ?? "").trim();
      if (!clean) return null;
      if (!tableMap[clean]) tableMap[clean] = createEmptyPlayer(clean);
      return tableMap[clean];
    }

    function parseLeagueFromMatchRows(rows){
      const headerIndex = findMatchHeaderRow(rows);
      if (headerIndex === -1) {
        return {
          standings: [],
          stats: {
            currentMatchday: 0,
            totalMatches: 0,
            open: 0,
            done: 0
          }
        };
      }

      const header = rows[headerIndex];
      const idx = mapMatchHeaderIndexes(header);

      const players = {};
      let currentMatchday = 0;
      let totalMatches = 0;
      let open = 0;
      let done = 0;

      for (let i = headerIndex + 1; i < rows.length; i++) {
        const row = rows[i];

        const spieltag = toNumber(row[idx.spieltag]);
        const spieler1 = String(row[idx.spieler1] ?? "").trim();
        const spieler2 = String(row[idx.spieler2] ?? "").trim();
        const legs1 = toNumber(row[idx.legs1]);
        const legs2 = toNumber(row[idx.legs2]);
        const gewinner = String(row[idx.gewinner] ?? "").trim();
        const status = String(row[idx.status] ?? "").trim();

        if (!spieler1 || !spieler2) continue;

        totalMatches++;
        currentMatchday = Math.max(currentMatchday, spieltag);

        ensurePlayer(players, spieler1);
        ensurePlayer(players, spieler2);

        if (isFinishedStatus(status)) {
          done++;

          const p1 = players[spieler1];
          const p2 = players[spieler2];

          p1.spiele++;
          p2.spiele++;

          p1.legPlus += legs1;
          p1.legMinus += legs2;

          p2.legPlus += legs2;
          p2.legMinus += legs1;

          if (gewinner && players[gewinner]) {
            if (gewinner === spieler1) {
              p1.siege++;
              p1.punkte += 2;
              p2.niederlagen++;
            } else if (gewinner === spieler2) {
              p2.siege++;
              p2.punkte += 2;
              p1.niederlagen++;
            }
          } else {
            if (legs1 > legs2) {
              p1.siege++;
              p1.punkte += 2;
              p2.niederlagen++;
            } else if (legs2 > legs1) {
              p2.siege++;
              p2.punkte += 2;
              p1.niederlagen++;
            }
          }
        } else if (isOpenStatus(status) || !status) {
          open++;
        } else {
          open++;
        }
      }

      const standings = Object.values(players)
        .map(p => ({
          ...p,
          legDiff: p.legPlus - p.legMinus
        }))
        .filter(p => p.spieler)
        .sort((a, b) => {
          if (b.punkte !== a.punkte) return b.punkte - a.punkte;
          if (b.legDiff !== a.legDiff) return b.legDiff - a.legDiff;
          if (b.siege !== a.siege) return b.siege - a.siege;
          return a.spieler.localeCompare(b.spieler, "de");
        })
        .map((p, index) => ({
          platz: index + 1,
          ...p
        }));

      return {
        standings,
        stats: {
          currentMatchday,
          totalMatches,
          open,
          done
        }
      };
    }

    function mergeStats(allStats){
      return allStats.reduce((acc, s) => {
        acc.currentMatchday = Math.max(acc.currentMatchday, s.currentMatchday || 0);
        acc.totalMatches += s.totalMatches || 0;
        acc.open += s.open || 0;
        acc.done += s.done || 0;
        return acc;
      }, {
        currentMatchday: 0,
        totalMatches: 0,
        open: 0,
        done: 0
      });
    }

    function renderTopStats(stats){
      const currentMatchdayText = document.getElementById("currentMatchdayText");
      const currentMatchdaySub = document.getElementById("currentMatchdaySub");
      const matchesCount = document.getElementById("matchesCount");
      const openCount = document.getElementById("openCount");
      const doneCount = document.getElementById("doneCount");

      if (!stats.currentMatchday) {
        currentMatchdayText.textContent = "Kein Spieltag gefunden";
        currentMatchdaySub.textContent = "Bitte Liga-Blätter prüfen";
      } else {
        currentMatchdayText.textContent = `Spieltag ${stats.currentMatchday}`;
        currentMatchdaySub.textContent =
          stats.open === 0
            ? "Alle Spiele dieses Spieltags sind fertig"
            : `${stats.open} Begegnung(en) noch offen`;
      }

      matchesCount.textContent = stats.totalMatches;
      openCount.textContent = stats.open;
      doneCount.textContent = stats.done;
    }

    function renderLeague(name, data){
      const standings = data.standings;
      const stats = data.stats;

      const badges = [
        `<div class="badge">Spieler: ${standings.length}</div>`,
        `<div class="badge">Begegnungen: ${stats.totalMatches}</div>`,
        `<div class="badge">Offen: ${stats.open}</div>`,
        `<div class="badge">Fertig: ${stats.done}</div>`
      ];

      const rows = standings.map(row => `
        <tr>
          <td>${medalForPlace(row.platz) ? `<span class="medal">${medalForPlace(row.platz)}</span>` : ""}${row.platz}</td>
          <td class="player">${escapeHtml(row.spieler)}</td>
          <td>${row.siege}</td>
          <td>${row.niederlagen}</td>
          <td>${row.legDiff > 0 ? "+" : ""}${row.legDiff}</td>
          <td>${row.punkte}</td>
        </tr>
      `).join("");

      return `
        <section class="league card">
          <div class="league-head">
            <h2 class="league-title">${escapeHtml(name)}</h2>
          </div>
          <div class="league-body">
            <div class="badge-row">${badges.join("")}</div>
            <h3 class="section-title">Tabelle</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Platz</th>
                    <th>Spieler</th>
                    <th>Siege</th>
                    <th>Niederlagen</th>
                    <th>Leg-Diff</th>
                    <th>Punkte</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows}
                </tbody>
              </table>
            </div>
          </div>
        </section>
      `;
    }

    async function loadPage(){
      const content = document.getElementById("content");
      content.className = "loading card";
      content.textContent = "Daten werden geladen...";

      try {
        const results = await Promise.all(
          LEAGUE_SHEETS.map(async (sheetName) => {
            try {
              const rows = await fetchSheetRows(sheetName);
              const parsed = parseLeagueFromMatchRows(rows);
              return {
                name: sheetName,
                ...parsed
              };
            } catch (err) {
              console.error("Fehler in Blatt:", sheetName, err);
              return {
                name: sheetName,
                standings: [],
                stats: {
                  currentMatchday: 0,
                  totalMatches: 0,
                  open: 0,
                  done: 0
                }
              };
            }
          })
        );

        const visibleLeagues = results.filter(l => l.standings.length > 0);
        const merged = mergeStats(results.map(r => r.stats));

        renderTopStats(merged);

        if (!visibleLeagues.length) {
          content.className = "empty card";
          content.textContent = "Keine Ligen mit Spielern gefunden.";
          return;
        }

        content.className = "";
        content.innerHTML = visibleLeagues.map(l => renderLeague(l.name, l)).join("");
      } catch (err) {
        console.error(err);
        content.className = "error card";
        content.innerHTML = "Fehler beim Laden. Bitte Spreadsheet-ID, Freigabe und Blattnamen prüfen.";
      }
    }

    loadPage();
  </script>
</body>
</html>
