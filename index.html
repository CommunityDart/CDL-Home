<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CDL Season 2</title>

<style>
body{font-family:Arial;background:#0a1018;color:#fff;margin:0;padding:20px;}
h1{margin-bottom:20px;}
.tabs button{margin:5px;padding:10px 15px;border:none;background:#1a2a40;color:#fff;cursor:pointer;border-radius:8px;}
.tabs button.active{background:#4d8cff;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{padding:10px;border-bottom:1px solid #333;text-align:left;}
.top1{background:#3a2f00;}
.top2{background:#2c2c2c;}
.top3{background:#3a1f00;}
.matchday{margin-top:30px;padding:15px;background:#101927;border-radius:10px;}
.match{display:flex;justify-content:space-between;padding:5px 0;}
.open{color:orange;}
.done{color:lightgreen;}
</style>
</head>

<body>

<h1>CDL Season 2</h1>

<div class="tabs" id="leagueTabs"></div>
<div id="content"></div>

<script>

// ✅ DEINE SHEET ID IST BEREITS EINGEBAUT
const SHEET_ID = "2PACX-1vS6OiloX6KoFsJwHFiJj1BGbZ0s-sL5MxckOnBD8_gvVovwBQeGs7OUmXwZ_Udwllob2bRgc-rnojEe";

const leagues = [
"Autodarts Liga 1","Autodarts Liga 2","Autodarts Liga 3",
"Autodarts Liga 4","Autodarts Liga 5","Autodarts Liga 6",
"DartCounter Liga 1","DartCounter Liga 2","DartCounter Liga 3",
"DartCounter Liga 4","DartCounter Liga 5","DartCounter Liga 6"
];

const tabs = document.getElementById("leagueTabs");
const content = document.getElementById("content");

leagues.forEach(l=>{
const btn=document.createElement("button");
btn.innerText=l;
btn.onclick=()=>loadLeague(l,btn);
tabs.appendChild(btn);
});

async function loadLeague(league,btn){
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(league)}&tqx=out:json`;

const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

const rows=json.table.rows.map(r=>r.c.map(c=>c?c.v:""));
render(rows);
}

function render(rows){

let html="<table>";

rows.forEach((row,i)=>{
if(i===0){
html+="<tr>"+row.map(c=>`<th>${c}</th>`).join("")+"</tr>";
}
else if(i<20){
let cls=i===1?"top1":i===2?"top2":i===3?"top3":"";
html+=`<tr class="${cls}">`+row.map(c=>`<td>${c}</td>`).join("")+"</tr>";
}
});

html+="</table>";
html+="<div class='matchday'>";

rows.forEach(row=>{
if(String(row[0]).includes("Spieltag")){
html+=`<h3>${row[0]}</h3>`;
}
else if(row[1] && row[3]){
let status=row[7]==="Fertig"?"done":"open";
html+=`<div class="match">
<span>${row[1]}</span>
<span class="${status}">${row[5]||"-"}:${row[6]||"-"}</span>
<span>${row[3]}</span>
</div>`;
}
});

html+="</div>";
content.innerHTML=html;
}

// erste Liga laden
loadLeague(leagues[0], tabs.children[0]);

</script>

</body>
</html>
