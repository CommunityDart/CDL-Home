<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDL Season 2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#081018;
  color:#fff;
}

.wrap{max-width:1100px;margin:auto;padding:20px;}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.discord{
  background:#5865F2;
  padding:10px 15px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

/* CARDS */
.card{
  background:#0f1a2b;
  border:1px solid #22324a;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th,td{
  padding:10px;
  border-bottom:1px solid #22324a;
  text-align:center;
}
th{background:#142338;}

.last{color:red;font-weight:bold;}

/* MATCH */
.matchdays{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.group{padding:8px;border-radius:10px;}
.group-open{border:2px solid orange;}
.group-done{border:2px solid green;}

.match{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  padding:5px;
}

.match.open{background:rgba(255,165,0,.1);}
.match.done{background:rgba(0,200,100,.1);}

/* BUTTONS */
button{
  background:#18304d;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}

</style>
</head>

<body>

<div class="wrap">

<div class="header">
  <h2>CDL Season 2</h2>
  <a href="DEIN_DISCORD_LINK" target="_blank" class="discord">🎮 Discord beitreten</a>
</div>

<div id="platforms" class="tabs"></div>
<div id="leagues" class="tabs"></div>

<div class="card">
  <h3 id="title"></h3>
</div>

<div class="card">
  <h3>Tabelle</h3>
  <div id="table"></div>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;">
    <h3>Spieltage</h3>
    <label><input type="checkbox" id="toggle"> nur offene</label>
  </div>
  <div id="matches" class="matchdays"></div>
</div>

</div>

<script>
const SHEET="1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

const CONFIG={
  autodarts:["Autodarts Liga 1"],
  dartcounter:["DartCounter Liga 1"]
};

let platform="autodarts";
let league=null;

/* SAFE FETCH */
async function load(sheet){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?sheet=${encodeURIComponent(sheet)}&tqx=out:json` [docs.google.com];
    const res=await fetch(url);
    const txt=await res.text();

    if(!txt.includes("google.visualization")){
      throw new Error("Sheet nicht öffentlich");
    }

    const json=JSON.parse(txt.substring(47).slice(0,-2));
    return json.table.rows.map(r=>r.c.map(c=>c?c.v:""));

  }catch(e){
    console.error("Fehler:",sheet,e);
    return [];
  }
}

/* DISCORD MAP */
function mapDiscord(rows){
  let m={};
  rows.forEach(r=>{
    if(r[0]) m[r[0]]=r[1];
  });
  return m;
}

/* TABLE */
function drawTable(rows,discord){
  let valid=rows.filter(r=>r[1] && r[1]!=="Spieler 1");

  let html="<table><tr><th>#</th><th>Spieler</th><th>S</th><th>N</th><th>LD</th><th>P</th></tr>";

  valid.forEach((r,i)=>{
    let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
    let last=i===valid.length-1?" <span class='last'>⬇️</span>":"";

    html+=`
    <tr>
      <td>${medal}${r[0]}${last}</td>
      <td>${r[1]}<br><small>${discord[r[1]]||""}</small></td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("table").innerHTML=html;
}

/* MATCHES */
function drawMatches(rows){
  let onlyOpen=document.getElementById("toggle").checked;
  let groups={};

  rows.forEach(r=>{
    if(!r[0]||!r[1]||!r[3]) return;
    if(!groups[r[0]]) groups[r[0]]=[];

    groups[r[0]].push({
      p1:r[1],
      p2:r[3],
      done:r[5]&&r[6],
      score:r[5]?r[5]+":"+r[6]:"-"
    });
  });

  let html="";

  Object.keys(groups).forEach(day=>{
    let g=groups[day];
    let doneAll=g.every(m=>m.done);

    let visible=onlyOpen?g.filter(m=>!m.done):g;
    if(onlyOpen && visible.length===0) return;

    html+=`<div class="group ${doneAll?'group-done':'group-open'}">
      <b>Spieltag ${day}</b>`;

    visible.forEach(m=>{
      html+=`
      <div class="match ${m.done?'done':'open'}">
        <div>${m.p1}</div>
        <div>${m.score}</div>
        <div>${m.p2}</div>
      </div>`;
    });

    html+="</div>";
  });

  document.getElementById("matches").innerHTML=html;
}

/* TABS */
function renderPlatforms(){
  const el=document.getElementById("platforms");
  el.innerHTML="";

  Object.keys(CONFIG).forEach(p=>{
    let b=document.createElement("button");
    b.innerText=p;
    b.onclick=()=>{platform=p;league=null;init();};
    el.appendChild(b);
  });
}

function renderLeagues(){
  const el=document.getElementById("leagues");
  el.innerHTML="";

  CONFIG[platform].forEach(l=>{
    let b=document.createElement("button");
    b.innerText=l;
    b.onclick=()=>{league=l;init();};
    el.appendChild(b);
  });

  if(!league) league=CONFIG[platform][0];
}

/* INIT */
async function init(){
  renderPlatforms();
  renderLeagues();

  document.getElementById("title").innerText=league;

  const [t,m,s]=await Promise.all([
    load(league),
    load("Erg "+league),
    load("Spieler_Discord")
  ]);

  drawTable(t,mapDiscord(s));
  drawMatches(m);
}

document.getElementById("toggle").addEventListener("change",init);

init();
</script>

</body>
</html>
