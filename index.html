<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDL Season 2</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#081018;
      color:#fff;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }
    h1{
      margin:0 0 20px;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    button{
      border:none;
      background:#18304d;
      color:#fff;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      font-weight:700;
    }
    button.active{
      background:#4d8cff;
    }
    .card{
      background:#0f1a2b;
      border:1px solid #22324a;
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
    }
    h2,h3{
      margin:0 0 12px;
    }
    table{
      width:100%;
      border-collapse:collapse;
    }
    th,td{
      padding:10px;
      border-bottom:1px solid #22324a;
      text-align:left;
    }
    th{
      background:#142338;
    }
    .center{
      text-align:center;
    }
    .top1{background:rgba(212,175,55,.18);}
    .top2{background:rgba(192,192,192,.12);}
    .top3{background:rgba(205,127,50,.14);}
    .group{
      margin-bottom:14px;
      border:1px solid #22324a;
      border-radius:10px;
      overflow:hidden;
    }
    .group-head{
      background:#142338;
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:700;
    }
    .badge{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
    }
    .badge.offen{
      background:rgba(255,165,0,.18);
      color:#ffcc66;
    }
    .badge.fertig{
      background:rgba(0,200,100,.18);
      color:#8df0b0;
    }
    .match{
      display:grid;
      grid-template-columns:1fr auto 1fr auto;
      gap:10px;
      padding:10px 12px;
      border-top:1px solid #22324a;
      align-items:center;
    }
    .score{
      font-weight:700;
      padding:4px 10px;
      border-radius:999px;
      background:#1a2b44;
      min-width:70px;
      text-align:center;
    }
    .score.offen{
      color:#ffcc66;
    }
    .score.fertig{
      color:#8df0b0;
    }
    .state{
      font-size:12px;
      color:#9fb3cc;
      text-transform:uppercase;
      text-align:right;
    }
    .right{
      text-align:right;
    }
    .muted{
      color:#9fb3cc;
    }
    @media (max-width: 700px){
      .match{
        grid-template-columns:1fr;
      }
      .right,.state{
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CDL Season 2</h1>

    <div class="row" id="platformTabs"></div>
    <div class="row" id="leagueTabs"></div>

    <div class="card">
      <h2 id="title">Lädt…</h2>
      <div class="muted" id="meta">Daten werden geladen…</div>
    </div>

    <div class="card">
      <h3>Tabelle</h3>
      <div id="tableBox">Lädt…</div>
    </div>

    <div class="card">
      <h3>Spieltage</h3>
      <div id="matchdaysBox">Lädt…</div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";

    const CONFIG = {
      autodarts: [
        "Autodarts Liga 1",
        "Autodarts Liga 2",
        "Autodarts Liga 3",
        "Autodarts Liga 4",
        "Autodarts Liga 5",
        "Autodarts Liga 6"
      ],
      dartcounter: [
        "DartCounter Liga 1",
        "DartCounter Liga 2",
        "DartCounter Liga 3",
        "DartCounter Liga 4",
        "DartCounter Liga 5",
        "DartCounter Liga 6"
      ]
    };

    let currentPlatform = "autodarts";
    let currentLeague = CONFIG[currentPlatform][0];

    const platformTabs = document.getElementById("platformTabs");
    const leagueTabs = document.getElementById("leagueTabs");
    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const tableBox = document.getElementById("tableBox");
    const matchdaysBox = document.getElementById("matchdaysBox");

    function esc(str){
      return String(str ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[s]));
    }

    function clean(v){
      return String(v ?? "").trim();
    }

    function cellValue(cell){
      if (!cell) return "";
      if (cell.f != null && cell.f !== "") return String(cell.f).trim();
      if (cell.v == null) return "";
      return String(cell.v).trim();
    }

    function gvizUrl(sheetName){
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json&t=${Date.now()}`;
    }

    async function fetchSheet(sheetName){
      const res = await fetch(gvizUrl(sheetName));
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return (json.table.rows || []).map(r => (r.c || []).map(cellValue));
    }

    function renderPlatformTabs(){
      platformTabs.innerHTML = "";
      Object.keys(CONFIG).forEach(key => {
        const btn = document.createElement("button");
        btn.textContent = key === "autodarts" ? "Autodarts" : "DartCounter";
        if (key === currentPlatform) btn.classList.add("active");
        btn.onclick = () => {
          currentPlatform = key;
          currentLeague = CONFIG[key][0];
          renderPlatformTabs();
          renderLeagueTabs();
          loadLeague();
        };
        platformTabs.appendChild(btn);
      });
    }

    function renderLeagueTabs(){
      leagueTabs.innerHTML = "";
      CONFIG[currentPlatform].forEach(league => {
        const btn = document.createElement("button");
        btn.textContent = league;
        if (league === currentLeague) btn.classList.add("active");
        btn.onclick = () => {
          currentLeague = league;
          renderLeagueTabs();
          loadLeague();
        };
        leagueTabs.appendChild(btn);
      });
    }

    function parseSheet(rows){
      let tableHeaderIndex = -1;

      for (let i = 0; i < rows.length; i++) {
        const joined = rows[i].map(v => clean(v).toLowerCase()).join(" | ");
        if (joined.includes("platz") && joined.includes("spieler") && joined.includes("punkte")) {
          tableHeaderIndex = i;
          break;
        }
      }

      if (tableHeaderIndex === -1) {
        return { tableCols: [], tableRows: [], matchdays: [] };
      }

      const tableCols = rows[tableHeaderIndex].slice(0, 6).map(clean);
      const afterHeader = rows.slice(tableHeaderIndex + 1);

      let matchdayStart = -1;
      for (let i = 0; i < afterHeader.length; i++) {
        if (/^spieltag\s*\d+$/i.test(clean(afterHeader[i][0]))) {
          matchdayStart = i;
          break;
        }
      }

      const tableRows = (matchdayStart === -1 ? afterHeader : afterHeader.slice(0, matchdayStart))
        .map(r => r.slice(0, 6))
        .filter(r => clean(r[1]) !== "");

      const matchRows = matchdayStart === -1 ? [] : afterHeader.slice(matchdayStart);
      const matchdays = parseMatchdays(matchRows);

      return { tableCols, tableRows, matchdays };
    }

    function parseMatchdays(rows){
      const groups = [];
      let current = null;

      for (const row of rows) {
        const a = clean(row[0]);
        const b = clean(row[1]);
        const d = clean(row[3]);
        const f = clean(row[5]);
        const g = clean(row[6]);
        const h = clean(row[7]);

        if (/^spieltag\s*\d+$/i.test(a)) {
          current = { title: a, matches: [] };
          groups.push(current);
          continue;
        }

        if (!current) continue;
        if (!b || !d) continue;
        if (/spieler 1/i.test(b)) continue;

        const finished = f !== "" && g !== "" && !isNaN(Number(f)) && !isNaN(Number(g));
        current.matches.push({
          p1: b,
          p2: d,
          score: finished ? `${f}:${g}` : "offen",
          status: finished || /fertig/i.test(h) ? "fertig" : "offen"
        });
      }

      return groups.filter(g => g.matches.length > 0);
    }

    function renderTable(cols, rows){
      if (!cols.length || !rows.length) {
        tableBox.innerHTML = "Keine Tabelle gefunden.";
        return;
      }

      let html = "<table><thead><tr>";
      cols.forEach((col, i) => {
        html += `<th class="${i === 1 ? "" : "center"}">${esc(col)}</th>`;
      });
      html += "</tr></thead><tbody>";

      rows.forEach((row, i) => {
        const rank = Number(clean(row[0])) || (i + 1);
        let cls = "";
        if (rank === 1) cls = "top1";
        if (rank === 2) cls = "top2";
        if (rank === 3) cls = "top3";

        html += `<tr class="${cls}">`;
        row.forEach((cell, idx) => {
          if (idx === 0) {
            const rankClass = rank <= 3 ? `r${rank}` : "";
            html += `<td class="center"><span class="rank ${rankClass}">${rank}</span></td>`;
          } else if (idx === 1) {
            html += `<td><span class="player">${esc(cell)}</span></td>`;
          } else {
            html += `<td class="center">${esc(cell)}</td>`;
          }
        });
        html += "</tr>";
      });

      html += "</tbody></table>";
      tableBox.innerHTML = html;
    }

    function renderMatchdays(groups){
      if (!groups.length) {
        matchdaysBox.innerHTML = "Keine Spieltage gefunden.";
        return;
      }

      let html = "";

      groups.forEach(group => {
        const allFinished = group.matches.every(m => m.status === "fertig");

        html += `<div class="group">`;
        html += `<div class="group-head">
          <span>${esc(group.title)}</span>
          <span class="badge ${allFinished ? "fertig" : "offen"}">${allFinished ? "fertig" : "offen"}</span>
        </div>`;

        group.matches.forEach(match => {
          html += `<div class="match">
            <div>${esc(match.p1)}</div>
            <div class="score ${match.status}">${esc(match.status === "fertig" ? match.score : "offen")}</div>
            <div class="right">${esc(match.p2)}</div>
            <div class="state">${esc(match.status)}</div>
          </div>`;
        });

        html += `</div>`;
      });

      matchdaysBox.innerHTML = html;
    }

    async function loadLeague(){
      titleEl.textContent = currentLeague;
      metaEl.textContent = "Daten werden geladen…";
      tableBox.innerHTML = "Lädt…";
      matchdaysBox.innerHTML = "Lädt…";

      try {
        const rows = await fetchSheet(currentLeague);
        const parsed = parseSheet(rows);
        renderTable(parsed.tableCols, parsed.tableRows);
        renderMatchdays(parsed.matchdays);
        metaEl.textContent = "Live aus Google Sheets geladen";
      } catch (err) {
        console.error(err);
        tableBox.innerHTML = "Fehler beim Laden der Tabelle.";
        matchdaysBox.innerHTML = "Fehler beim Laden der Spieltage.";
        metaEl.textContent = "Laden fehlgeschlagen";
      }
    }

    renderPlatformTabs();
    renderLeagueTabs();
    loadLeague();
  </script>
</body>
</html>
