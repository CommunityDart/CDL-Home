<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Dart Liga</title>
  <style>
    :root{
      --bg:#03131b;
      --panel:#041924;
      --line:rgba(120,170,195,.12);
      --text:#f5fbff;
      --muted:#90a9b7;
      --green:#3ddc97;
      --red:#e74c3c;
      --yellow:#f7c948;
      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
      --row-a:#052130;
      --row-b:#041924;
    }

    body[data-mode="DartCounter"]{
      --accent:#ff9f1c;
      --accent-border:rgba(255,159,28,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, #021017 100%);
      color:var(--text);
      min-height:100vh;
      transition:background .2s ease;
    }

    .wrap{
      width:min(1400px, calc(100% - 28px));
      margin:0 auto;
      padding:8px 0 42px;
    }

    /* ===== BANNER OPTIMIERUNG ===== */
    .hero-banner.image-banner{
      position:relative;
      margin:0 0 14px;
      aspect-ratio: 4 / 1; 
      width: 100%;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 44px rgba(0,0,0,.34);
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)),
        url("banner.png") center center / cover no-repeat;
      background-color:#000;
    }

    .hero-banner.image-banner::before{
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.02) 0%, rgba(0,0,0,.06) 55%, rgba(0,0,0,.12) 100%);
      pointer-events:none;
    }

    .button, .mode-btn, .footer-btn, .footer-link, .info-btn, .hero-action-btn{
      border:1px solid rgba(75,135,165,.28); background:rgba(4,25,36,.96);
      color:var(--text); border-radius:12px; min-height:46px; padding:0 16px;
      font-size:14px; cursor:pointer; font-weight:800; transition:.16s ease;
      text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }

    /* Spielername Styling */
    .player-name-clickable {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 800;
    }

    .banner-nav{
      display:grid; grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px; padding:12px; border-radius:22px;
      background:rgba(4,12,14,.22); border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }

    .submenu-row{ display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:12px; margin-top:10px; }
    .submenu-slot{ min-height:52px; display:none; flex-wrap:wrap; gap:10px; }
    .submenu-slot.active{ display:flex; }
    .submenu-slot.left{ grid-column:1 / span 3; }
    .submenu-slot.middle{ grid-column:2 / span 3; }

    .submenu-btn{
      border:1px solid rgba(75,135,165,.24); background:rgba(5,26,37,.92);
      color:#dff3ff; padding:11px 14px; border-radius:12px; font-weight:800; cursor:pointer;
    }
    .submenu-btn.active{ border-color:var(--accent-border); background:#082738; box-shadow: inset 3px 0 0 var(--accent); }

    .main{ display:grid; grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr); gap:18px; }
    .table-shell, .matchday{ border:1px solid var(--line); background:rgba(4,25,36,0.95); border-radius:18px; overflow:hidden; }

    table{ width:100%; border-collapse:collapse; }
    th{ padding:14px; background:#041722; text-align:left; font-size:12px; color:var(--muted); text-transform:uppercase; }
    td{ padding:14px; border-bottom:1px solid var(--line); font-size:14px; }
    
    .rank-col{ width:70px; font-weight:900; position:relative; }
    .rank-col.first::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:var(--green); }
    .rank-col.last::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:var(--red); }

    .player-meta-row{ display:flex; align-items:center; gap:8px; margin-top:4px; font-size:11px; }
    .card-badge{ width:12px; height:16px; border-radius:2px; display:inline-block; border:1px solid rgba(255,255,255,0.2); }
    .card-badge.yellow{ background:var(--yellow); }
    .card-badge.red{ background:var(--red); }

    .footer{ margin-top:40px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .footer-note{ width:100%; text-align:center; color:var(--muted); font-size:12px; }

    /* Modals */
    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; z-index:1000; }
    .modal-backdrop.open{ display:flex; }
    .modal{ width:min(500px, 95%); background:var(--panel); border-radius:20px; border:1px solid var(--line); overflow:hidden; }
    .modal-head{ padding:18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
    .modal-body{ padding:20px; color:#ddd; line-height:1.6; }

    .detail-item { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); display:flex; justify-content: space-between; }
    .detail-label { color: var(--muted); font-size: 13px; }
    .detail-val { font-weight: 800; color: var(--accent); }

    @media (max-width:1100px){ .main{ grid-template-columns:1fr; } }
    @media (max-width:760px){
      .hero-banner.image-banner{ aspect-ratio: 2.5 / 1; }
      .banner-nav, .submenu-row{ grid-template-columns:repeat(2, 1fr); }
    }
  </style>
</head>
<body data-mode="Autodarts">
  <div class="wrap">
    <section class="hero-banner image-banner"></section>

    <div class="top-nav-wrap">
      <section class="banner-nav-shell">
        <div class="banner-nav">
          <button id="modeAutodarts" class="hero-action-btn active">Autodarts</button>
          <button id="modeDartCounter" class="hero-action-btn">DartCounter</button>
          <a href="#" class="hero-action-btn">Discord</a>
          <button id="regelwerkBtn" class="hero-action-btn">Regelwerk</button>
          <button id="faqBtn" class="hero-action-btn">FAQ</button>
        </div>
      </section>
      <div class="submenu-row">
        <div id="autodartsSubmenu" class="submenu-slot left active"></div>
        <div id="dartcounterSubmenu" class="submenu-slot middle"></div>
      </div>
    </div>

    <section class="main">
      <div id="tableArea"></div>
      <aside class="sidebar">
        <div id="matchdayArea" class="matchday-list"></div>
      </aside>
    </section>

    <div class="footer">
      <button id="openImpressumBtn" class="footer-btn">Impressum</button>
      <a class="footer-link" href="#">Spenden</a>
      <div class="footer-note">Community Dart Liga 2026</div>
    </div>
  </div>

  <div id="playerModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3 id="pModalTitle">Spieler-Info</h3><button onclick="closePModal()" class="button">✕</button></div>
      <div id="pModalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="infoModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3 id="infoTitle">Info</h3><button onclick="closeInfoModal()" class="button">✕</button></div>
      <div id="infoBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";
    const PLAYER_SHEET = "Spieler_Discord";
    const RULES_SHEET = "Regelwerk";
    const FAQ_SHEET = "FAQ";
    const LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6", "DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3", "DartCounter Liga 4", "DartCounter Liga 5", "DartCounter Liga 6"];

    const state = { leagues: [], leagueData: {}, activeLeague: null, activeMode: "Autodarts", playerMetaMap: {}, matchdayOpenState: {} };

    // --- ROBUSTER CSV PARSER ---
    function parseCsv(text) {
      const rows = []; let row = []; let cell = ""; let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i]; const next = text[i+1];
        if (inQuotes) {
          if (char === '"' && next === '"') { cell += '"'; i++; }
          else if (char === '"') inQuotes = false;
          else cell += char;
        } else {
          if (char === '"') inQuotes = true;
          else if (char === ',') { row.push(cell); cell = ""; }
          else if (char === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
          else if (char !== '\r') cell += char;
        }
      }
      row.push(cell); rows.push(row); return rows;
    }

    function normalize(v) { return String(v ?? "").trim().toLowerCase().replace(/\s+/g, " "); }
    function htmlEscape(v) { return String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function csvUrl(sn) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sn)}`; }

    async function loadCsv(sn) {
      const r = await fetch(csvUrl(sn));
      if (!r.ok) throw new Error("Fehler");
      return parseCsv(await r.text());
    }

    // Karten-Logik
    function parseCardInfo(val) {
      const v = normalize(val);
      if (!v) return { yellow: 0, red: 0, hasRed: false };
      if (v.includes("rot")) return { yellow: 0, red: 1, hasRed: true };
      const yCount = (v.match(/gelb/g) || []).length;
      if (yCount >= 2 || v.includes("2x gelb")) return { yellow: 2, red: 0, hasRed: false };
      return { yellow: yCount >= 1 ? 1 : 0, red: 0, hasRed: false };
    }

    async function loadAll() {
      try {
        // 1. Spieler Meta & AVG laden
        const pRows = await loadCsv(PLAYER_SHEET);
        pRows.forEach(r => {
          const name = normalize(r[0]);
          if(name && name !== "spieler") {
            state.playerMetaMap[name] = {
              discord: r[1] || "K.A.",
              avg: r[4] || "-", // Spalte E
              platform: r[0],
              ...parseCardInfo(r[6])
            };
          }
        });

        // 2. Ligen laden
        for (const l of LEAGUES) {
          const rows = await loadCsv(l).catch(()=>[]);
          const ergs = await loadCsv(`Erg ${l}`).catch(()=>[]);
          
          let tm = -1;
          for(let i=0; i<rows.length; i++) if(rows[i].join("").toLowerCase().includes("tabelle")) tm = i;
          
          const standings = [];
          if(tm !== -1) {
            for(let i=tm+1; i<rows.length; i++) {
              if(rows[i][0] && !isNaN(rows[i][0])) {
                standings.push([rows[i][0], rows[i][1], rows[i][2], rows[i][3], rows[i][4], rows[i][5]]);
              }
            }
          }

          const matchdays = new Map();
          ergs.forEach(r => {
            const sn = r[0]; if(!sn || isNaN(sn)) return;
            if(!matchdays.has(sn)) matchdays.set(sn, []);
            matchdays.get(sn).push(r);
          });

          state.leagueData[l] = { 
            standings, 
            matchdays: Array.from(matchdays.entries()).map(([sn, mRows]) => ({
              title: `Spieltag ${sn}`,
              rows: mRows,
              done: mRows.filter(mr => normalize(mr[7]).includes("fertig") || (mr[5] && mr[6] && mr[5] !== "-")).length
            })).sort((a,b) => a.title.localeCompare(b.title, undefined, {numeric:true}))
          };
        }
        setMode("Autodarts");
      } catch (e) { console.error(e); }
    }

    function renderLeague() {
      const data = state.leagueData[state.activeLeague];
      if(!data) return;

      // Tabelle rendern
      const sorted = [...data.standings].sort((a,b) => {
        const ma = state.playerMetaMap[normalize(a[1])] || {};
        const mb = state.playerMetaMap[normalize(b[1])] || {};
        if(ma.hasRed !== mb.hasRed) return ma.hasRed ? 1 : -1;
        return parseInt(a[0]) - parseInt(b[0]);
      });

      const tbody = sorted.map((r, idx) => {
        const meta = state.playerMetaMap[normalize(r[1])] || {};
        const cards = [];
        for(let i=0; i<meta.yellow; i++) cards.push('<span class="card-badge yellow"></span>');
        for(let i=0; i<meta.red; i++) cards.push('<span class="card-badge red"></span>');

        return `<tr>
          <td class="rank-col ${idx===0?'first':(idx===sorted.length-1?'last':'')}">${idx+1}</td>
          <td>
            <span class="player-name-clickable" onclick="openPlayer('${normalize(r[1])}')">${r[1]}</span>
            <div class="player-meta-row">${meta.discord ? `<span>${meta.discord}</span>` : ''} ${cards.join("")}</div>
          </td>
          <td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td style="font-weight:900">${r[5]}</td>
        </tr>`;
      }).join("");

      document.getElementById("tableArea").innerHTML = `<div class="table-shell">
        <div class="section-head"><h3>${state.activeLeague}</h3></div>
        <table><thead><tr><th>#</th><th>Spieler</th><th>S</th><th>N</th><th>+/-</th><th>Pkt</th></tr></thead><tbody>${tbody}</tbody></table>
      </div>`;

      // Spieltage rendern
      document.getElementById("matchdayArea").innerHTML = data.matchdays.map(d => `
        <div class="matchday">
          <button class="matchday-head" onclick="this.parentElement.classList.toggle('open')">
            <span>${d.title}</span><span>${d.done}/${d.rows.length}</span>
          </button>
          <div class="matchday-body">
            <table style="min-width:100%">
              ${d.rows.map(mr => `<tr><td>${mr[1]}</td><td>${mr[3]}</td><td align="right">${mr[5]}:${mr[6]}</td></tr>`).join("")}
            </table>
          </div>
        </div>
      `).join("");
    }

    function openPlayer(id) {
      const m = state.playerMetaMap[id] || { platform: id, discord: "Unbekannt", avg: "-" };
      document.getElementById("pModalBody").innerHTML = `
        <div class="detail-item"><span class="detail-label">Plattform:</span> <span class="detail-val">${m.platform}</span></div>
        <div class="detail-item"><span class="detail-label">Discord:</span> <span class="detail-val">${m.discord}</span></div>
        <div class="detail-item"><span class="detail-label">Eingereichter AVG:</span> <span class="detail-val">${m.avg}</span></div>
      `;
      document.getElementById("playerModal").classList.add("open");
    }

    function setMode(m) {
      state.activeMode = m;
      document.body.setAttribute("data-mode", m);
      const filtered = LEAGUES.filter(l => l.startsWith(m) && state.leagueData[l]?.standings.length > 0);
      state.activeLeague = filtered[0];

      const renderSub = (el, list) => {
        el.innerHTML = list.map(l => `<button class="submenu-btn ${l===state.activeLeague?'active':''}" onclick="state.activeLeague='${l}';renderLeague();renderSubmenus();">${l}</button>`).join("");
      };
      renderSubmenus(); renderLeague();
    }

    function renderSubmenus() {
      const sA = document.getElementById("autodartsSubmenu");
      const sD = document.getElementById("dartcounterSubmenu");
      const filter = (m) => LEAGUES.filter(l => l.startsWith(m) && state.leagueData[l]?.standings.length > 0);
      
      const subBtn = (l) => `<button class="submenu-btn ${l===state.activeLeague?'active':''}" onclick="state.activeLeague='${l}';renderLeague();renderSubmenus();">${l}</button>`;
      
      sA.innerHTML = filter("Autodarts").map(subBtn).join("");
      sD.innerHTML = filter("DartCounter").map(subBtn).join("");
      sA.classList.toggle("active", state.activeMode === "Autodarts");
      sD.classList.toggle("active", state.activeMode === "DartCounter");
    }

    function closePModal() { document.getElementById("playerModal").classList.remove("open"); }
    function closeInfoModal() { document.getElementById("infoModal").classList.remove("open"); }

    document.getElementById("modeAutodarts").onclick = () => setMode("Autodarts");
    document.getElementById("modeDartCounter").onclick = () => setMode("DartCounter");
    
    loadAll();
  </script>
</body>
</html>
